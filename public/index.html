<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Affiliates</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--sb:#0f1117;--sbh:#1a1d27;--sba:#1e2230;--bd:#2a2d3d;--bg:#14161f;--bg2:#1a1d27;--bg3:#1e2230;--bg4:#242838;--t:#e2e4ed;--t2:#9096b0;--t3:#5a5f78;--ac:#4f7ef8;--acb:rgba(79,126,248,.13);--gr:#22c88a;--grb:rgba(34,200,138,.13);--rd:#f0545c;--rdb:rgba(240,84,92,.13);--yw:#f5b731;--ywb:rgba(245,183,49,.13);--pu:#9b6dff;--pub:rgba(155,109,255,.13);--or:#ff8c5a;--orb:rgba(255,140,90,.13);--r:8px;--rl:12px;--sw:228px;--shd:0 8px 32px rgba(0,0,0,.5)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);font-size:14px;height:100vh;display:flex;overflow:hidden}
.sb{width:var(--sw);background:var(--sb);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:16px 14px 12px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--bd)}
.sb-logo-ic{width:28px;height:28px;background:var(--ac);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-logo-t{font-size:13px;font-weight:700;color:var(--t)}
.sb-logo-s{font-size:10px;color:var(--t3)}
.sb-sec{padding:8px 8px 2px}
.sb-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:0 8px;margin-bottom:2px}
.ni{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--r);color:#6e7590;font-size:13px;font-weight:500;cursor:pointer;transition:all .1s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:var(--sbh);color:var(--t2)}
.ni.on{background:var(--sba);color:var(--t)}
.ni .ic{font-size:14px;width:17px;text-align:center;flex-shrink:0}
.sb-ft{margin-top:auto;padding:10px 8px;border-top:1px solid var(--bd)}
.sp{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:var(--r);background:var(--bg3);font-size:11px;color:var(--t3)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gr);flex-shrink:0}
.dot.off{background:var(--rd)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:10px;padding:0 20px;height:48px;border-bottom:1px solid var(--bd);background:var(--bg);flex-shrink:0}
.tb-title{font-size:14px;font-weight:600}
.tb-sp{flex:1}
.swrap{position:relative}
.swrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.sinp{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:5px 8px 5px 28px;font-size:13px;font-family:inherit;color:var(--t);outline:none;width:190px}
.sinp:focus{border-color:var(--ac)}
.sinp::placeholder{color:var(--t3)}
.tbar{display:flex;align-items:center;gap:6px;padding:8px 20px;border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap}
.fs{padding:4px 8px;border:1px solid var(--bd);border-radius:var(--r);font-size:12px;font-family:inherit;background:var(--bg2);color:var(--t2);outline:none;cursor:pointer}
.fs:focus{border-color:var(--ac)}
.fs option{background:var(--bg2)}
.ctag{font-size:12px;color:var(--t3);margin-left:2px}
.vt{display:flex;gap:2px;margin-left:auto}
.vb{padding:4px 8px;border:1px solid var(--bd);background:var(--bg2);color:var(--t3);border-radius:6px;font-size:12px;cursor:pointer}
.vb.on{background:var(--bg4);color:var(--t)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .12s;border:none;white-space:nowrap}
.bp{background:var(--ac);color:#fff}.bp:hover{filter:brightness(1.1)}
.bg{background:var(--bg3);color:var(--t2);border:1px solid var(--bd)}.bg:hover{background:var(--bg4);color:var(--t)}
.bd2{background:transparent;color:var(--rd);border:1px solid var(--bd)}.bd2:hover{background:var(--rdb)}
.sm{padding:3px 9px;font-size:12px}
.xsm{padding:2px 7px;font-size:11px}
.ca{flex:1;overflow:hidden;display:flex}
.cs{flex:1;overflow-y:auto}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bd-prospect{background:rgba(90,95,120,.18);color:#7a7f98}
.bd-outreach_sent{background:var(--acb);color:var(--ac)}
.bd-lead{background:var(--orb);color:var(--or)}
.bd-qualified{background:var(--ywb);color:var(--yw)}
.bd-call_booked{background:var(--pub);color:var(--pu)}
.bd-follow_up{background:rgba(34,200,138,.1);color:#60d0a0}
.bd-closed_won{background:var(--grb);color:var(--gr)}
.bd-closed_lost{background:var(--rdb);color:var(--rd)}
.bd-affiliate{background:rgba(79,126,248,.12);color:#7a9ff5}
.bd-deal{background:var(--grb);color:var(--gr)}
.bd-p1{background:var(--rdb);color:var(--rd)}
.bd-p2{background:var(--ywb);color:var(--yw)}
.bd-p3{background:rgba(90,95,120,.12);color:var(--t3)}
.bd-TikTok,.bd-tiktok{background:rgba(105,125,248,.15);color:#8da4f5}
.bd-Instagram,.bd-instagram{background:rgba(225,100,160,.15);color:#e080b8}
.bd-YouTube,.bd-youtube{background:rgba(240,80,80,.15);color:#f07070}
.bd-LinkedIn,.bd-linkedin{background:rgba(10,102,194,.15);color:#5a9fd4}
.bd-Twitter,.bd-twitter{background:rgba(29,161,242,.15);color:#52aaed}
.bd-Podcast,.bd-podcast{background:var(--orb);color:var(--or)}
.bd-Newsletter,.bd-newsletter{background:var(--grb);color:var(--gr)}
.bd-Other,.bd-other{background:rgba(90,95,120,.12);color:var(--t3)}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:5}
th{padding:7px 13px;text-align:left;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd);background:var(--bg2);cursor:pointer;white-space:nowrap}
th:hover{color:var(--t2)}
td{padding:9px 13px;border-bottom:1px solid var(--bd);vertical-align:middle;font-size:13px}
tr:hover td{background:rgba(255,255,255,.015)}
.tdn{font-weight:600;color:var(--t)}
.tdl{color:var(--ac);text-decoration:none;font-size:12px}
.tdl:hover{text-decoration:underline}
.kb{display:flex;gap:11px;padding:14px 16px;height:100%;overflow-x:auto;align-items:flex-start}
.kc{flex:0 0 200px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);display:flex;flex-direction:column;max-height:calc(100vh - 150px)}
.kh{padding:9px 11px 7px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bd)}
.kd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.kt{font-size:12px;font-weight:600;color:var(--t2);flex:1}
.kn{font-size:10px;background:var(--bg3);color:var(--t3);border-radius:10px;padding:1px 6px}
.kcards{flex:1;overflow-y:auto;padding:7px 7px 3px;display:flex;flex-direction:column;gap:6px}
.kcard{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:10px;cursor:pointer;transition:all .1s}
.kcard:hover{border-color:var(--ac)}
.kcard-n{font-size:12px;font-weight:600;color:var(--t);margin-bottom:2px}
.kcard-h{font-size:11px;color:var(--t3);margin-bottom:6px}
.kcard-tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px}
.kcard-val{font-size:11px;color:var(--gr);font-weight:600}
.kadd{margin:5px 7px 7px;padding:5px;background:none;border:1px dashed var(--bd);border-radius:var(--r);color:var(--t3);font-size:11px;cursor:pointer;text-align:center;font-family:inherit;width:calc(100% - 14px)}
.kadd:hover{border-color:var(--t2);color:var(--t2);background:var(--bg3)}
.drag-over{border-color:var(--ac)!important;background:rgba(79,126,248,.04)!important}
/* KPI Dashboard */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;padding:20px;padding-bottom:0}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac)}
.kpi.gr::before{background:var(--gr)}.kpi.yw::before{background:var(--yw)}.kpi.pu::before{background:var(--pu)}.kpi.or::before{background:var(--or)}
.kpi-val{font-size:28px;font-weight:700;color:var(--t);line-height:1}
.kpi-val.ac{color:var(--ac)}.kpi-val.gr{color:var(--gr)}.kpi-val.yw{color:var(--yw)}
.kpi-lbl{font-size:11px;color:var(--t3);margin-top:4px;font-weight:500}
.kpi-sub{font-size:11px;color:var(--t2);margin-top:2px}
/* Funnel bar */
.funnel-bar{padding:16px 20px}
.funnel-bar h3{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.fb-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.fb-lbl{font-size:11px;color:var(--t3);width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fb-track{flex:1;background:var(--bg3);border-radius:3px;height:18px;overflow:hidden}
.fb-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:700;color:rgba(255,255,255,.9);min-width:2px;transition:width .4s}
.fb-count{font-size:11px;color:var(--t2);width:28px;text-align:right;flex-shrink:0}
/* Charts */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px 20px}
.cc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 16px}
.ct2{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:10px}
.br{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.bl{width:85px;color:var(--t3);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bw{flex:1;background:var(--bg3);border-radius:3px;height:5px;overflow:hidden}
.bf{height:100%;border-radius:3px;background:var(--ac)}
.bf.gr{background:var(--gr)}
.bc{color:var(--t3);width:22px;text-align:right;flex-shrink:0}
/* Detail panel */
.dp{width:360px;flex-shrink:0;border-left:1px solid var(--bd);background:var(--bg);overflow-y:auto;display:none;flex-direction:column}
.dp.on{display:flex}
.dph{padding:13px 15px;border-bottom:1px solid var(--bd)}
.dph h2{font-size:15px;font-weight:700;color:var(--t);margin-bottom:6px;padding-right:24px}
.dph .tags{display:flex;gap:4px;flex-wrap:wrap}
.dpc{float:right;background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;padding:0 4px;border-radius:4px;margin-top:-2px}
.dpc:hover{background:var(--bg3)}
.dpb{padding:13px 15px;flex:1}
.dsec{margin-bottom:16px}
.dsec h4{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.df{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--bd);gap:8px}
.df:last-child{border:none}
.dl{font-size:12px;color:var(--t3);flex-shrink:0;width:90px}
.dv{font-size:12px;color:var(--t);text-align:right;flex:1;word-break:break-all}
.dv a{color:var(--ac);text-decoration:none}
.ssel{width:100%;padding:6px 8px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--bg3);color:var(--t);outline:none}
.ssel:focus{border-color:var(--ac)}
.ssel option{background:var(--bg2)}
.nta{width:100%;padding:8px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--bg3);color:var(--t);resize:vertical;min-height:80px;outline:none}
.nta:focus{border-color:var(--ac)}
.nta::placeholder{color:var(--t3)}
.ai{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12px}
.ai:last-child{border:none}
.ad{width:5px;height:5px;border-radius:50%;background:var(--t3);margin-top:4px;flex-shrink:0}
.at{flex:1;color:var(--t3)}
.atime{font-size:10px;color:var(--t3);flex-shrink:0}
.dpa{padding:10px 15px;border-top:1px solid var(--bd);display:flex;gap:6px;flex-wrap:wrap}
/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.ov.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);width:560px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:var(--shd)}
.mh{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between}
.mt{font-size:15px;font-weight:600}
.mc{background:none;border:none;font-size:20px;color:var(--t3);cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1}
.mc:hover{background:var(--bg3)}
.mb{padding:14px 20px;display:flex;flex-direction:column;gap:11px}
.fi{display:flex;flex-direction:column;gap:4px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fi label{font-size:12px;font-weight:500;color:var(--t3)}
.fi input,.fi select,.fi textarea{padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--bg3);color:var(--t);outline:none}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--ac)}
.fi input::placeholder,.fi textarea::placeholder{color:var(--t3)}
.fi textarea{resize:vertical;min-height:70px}
.fi select option{background:var(--bg2)}
.mf{padding:4px 20px 16px;display:flex;justify-content:flex-end;gap:7px}
.msep{height:1px;background:var(--bd);margin:4px 0}
/* Inbox */
.iitem{display:flex;align-items:flex-start;gap:10px;padding:12px 18px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.iitem:hover{background:var(--bg2)}
.iav{width:32px;height:32px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0;text-transform:uppercase}
.ib{flex:1;min-width:0}
.iname{font-size:13px;font-weight:600}
.isubj{font-size:12px;color:var(--t2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.isnip{font-size:12px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.imeta{text-align:right;flex-shrink:0}
.itime{font-size:11px;color:var(--t3)}
.iunread{width:6px;height:6px;border-radius:50%;background:var(--ac);margin:4px 0 0 auto}
/* Reid Chat */
.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.chat-msg{display:flex;align-items:flex-end;gap:8px}
.chat-msg.user{flex-direction:row-reverse}
.chat-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.chat-avatar.reid{background:var(--acb);color:var(--ac);border:1px solid var(--bd)}
.chat-avatar.user{background:var(--bg4);color:var(--t2)}
.chat-bubble{max-width:75%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.chat-msg.reid .chat-bubble{background:var(--bg3);border:1px solid var(--bd);border-bottom-left-radius:3px;color:var(--t)}
.chat-msg.user .chat-bubble{background:var(--ac);color:#fff;border-bottom-right-radius:3px}
.chat-meta{font-size:10px;color:var(--t3);margin-top:2px;text-align:right}
.chat-msg.reid .chat-meta{text-align:left}
.chat-input-wrap{padding:12px 18px;border-top:1px solid var(--bd);display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;padding:8px 12px;border:1px solid var(--bd);border-radius:var(--rl);font-size:13px;font-family:inherit;background:var(--bg3);color:var(--t);outline:none;resize:none;min-height:40px;max-height:120px;overflow-y:auto}
.chat-input:focus{border-color:var(--ac)}
.chat-input::placeholder{color:var(--t3)}
.chat-send{padding:8px 14px;background:var(--ac);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;flex-shrink:0;align-self:flex-end}
.chat-send:hover{filter:brightness(1.1)}
.chat-send:disabled{opacity:.5;cursor:not-allowed}
.chat-key-bar{padding:8px 18px;border-bottom:1px solid var(--bd);display:flex;gap:7px;align-items:center;background:var(--bg2)}
.chat-key-bar input{flex:1;padding:5px 8px;border:1px solid var(--bd);border-radius:var(--r);font-size:12px;font-family:inherit;background:var(--bg3);color:var(--t);outline:none}
.chat-key-bar input:focus{border-color:var(--ac)}
.typing{display:flex;gap:3px;align-items:center;padding:4px 0}
.typing span{width:5px;height:5px;background:var(--t3);border-radius:50%;animation:ty .8s ease infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes ty{0%,80%,100%{transform:scale(0.6);opacity:.5}40%{transform:scale(1);opacity:1}}
/* Playbook */
.pb-item{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 16px;margin-bottom:9px}
.pb-title{font-size:14px;font-weight:600;margin-bottom:5px}
.pb-content{font-size:13px;color:var(--t2);line-height:1.7;white-space:pre-wrap}
/* Admin */
.admin-section{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;margin-bottom:12px}
.admin-section h3{font-size:13px;font-weight:600;margin-bottom:10px}
.kv{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd);font-size:13px}
.kv:last-child{border:none}
.kv .lbl{color:var(--t3)}
.kv .val{color:var(--t);font-family:monospace;font-size:11px;background:var(--bg3);padding:2px 7px;border-radius:4px}
/* Toast */
.toasts{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast{padding:8px 13px;border-radius:var(--r);background:var(--bg4);color:var(--t);font-size:13px;border:1px solid var(--bd);box-shadow:var(--shd);animation:tIn .18s ease;max-width:260px}
.toast.ok{border-color:var(--gr);color:var(--gr)}.toast.err{border-color:var(--rd);color:var(--rd)}
@keyframes tIn{from{transform:translateX(12px);opacity:0}to{transform:translateX(0);opacity:1}}
.etag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap}
.etag-lead{background:var(--orb);color:var(--or)}
.etag-qualified{background:var(--ywb);color:var(--yw)}
.etag-call_booked{background:var(--pub);color:var(--pu)}
.etag-follow_up{background:rgba(34,200,138,.1);color:#60d0a0}
.etag-closed_won{background:var(--grb);color:var(--gr)}
.etag-closed_lost{background:var(--rdb);color:var(--rd)}
.etag-add{background:var(--bg4);color:var(--t3);border:1px dashed var(--bd)}
.etag-add:hover{border-color:var(--t2);color:var(--t2)}
.load{display:flex;align-items:center;justify-content:center;height:160px;color:var(--t3);gap:8px}
.spin{width:16px;height:16px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--t3)}

      <input class="sinp" id="srch" placeholder="Search…" oninput="applyFilters()">
    </div>
    <button class="btn bp" id="addBtn" onclick="openAdd()" style="display:none">+ Add Contact</button>

  <div class="tbar" id="tbar" style="display:none">

      <option value="">All Platforms</option>

            <input id="faud" type="number" placeholder="50000" style="flex:1;min-width:0">

<div class="toasts" id="toasts"></div>
<script>
const API = window.location.origin;
const KEY = 'apex-agent-secret-change-me';
let prospects=[], filtered=[], inboxEmails=[], playbook=[], chatHistory=[];
let page='dashboard', sub='table', editId=null, dragId=null;

const STAGES = {
  prospect:     {l:'Prospect',     e:'🎯', c:'#5a6070'},
  outreach_sent:{l:'Outreach Sent',e:'📤', c:'#4f7ef8'},
  lead:         {l:'Lead',         e:'🔥', c:'#ff8c5a'},
  qualified:    {l:'Qualified',    e:'⭐', c:'#f5b731'},
  call_booked:  {l:'Call Booked',  e:'📞', c:'#9b6dff'},
  follow_up:    {l:'Follow Up',    e:'🔄', c:'#60d0a0'},
  closed_won:   {l:'Closed Won',   e:'✅', c:'#22c88a'},
  closed_lost:  {l:'Closed Lost',  e:'❌', c:'#f0545c'},
};

async function req(m,p,b){
  const o={method:m,headers:{'x-api-key':KEY,'Content-Type':'application/json'}};
  if(b)o.body=JSON.stringify(b);
  const r=await fetch(API+p,o);
  if(!r.ok){const txt=await r.text();throw new Error(txt);}
  return r.json();
}
function toast(msg,t=''){const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;document.getElementById('toasts').appendChild(el);setTimeout(()=>el.remove(),3200);}
function setStatus(ok){document.getElementById('sdot').className='dot'+(ok?'':' off');document.getElementById('stxt').textContent=ok?'Connected':'Offline';}
function fmt(n){if(!n)return'—';n=parseInt(n);if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return n.toLocaleString();}
function fmtD(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtC(n){if(!n&&n!==0)return'—';if(n===0)return'$0';return'$'+Number(n).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});}
function ago(d){if(!d)return'';const s=(Date.now()-new Date(d))/1000;if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function sb(s){const st=STAGES[s]||{l:s,e:'•'};return`<span class="badge bd-${s}">${st.e} ${st.l}</span>`;}
function pb(p){if(!p)return'';return`<span class="badge bd-${p}">${p}</span>`;}
function ltb(lt){if(!lt)return'';const colors={'Potential Affiliate Partner':'rgba(79,126,248,.12)','Active Affiliate Partner':'rgba(34,200,138,.12)','Deal/Close':'rgba(245,183,49,.12)'};const textColors={'Potential Affiliate Partner':'#7a9ff5','Active Affiliate Partner':'#22c88a','Deal/Close':'#f5b731'};const bg=colors[lt]||'rgba(90,95,120,.12)';const tc=textColors[lt]||'#7a7f98';return`<span class="badge" style="background:${bg};color:${tc}">${lt}</span>`;}
function prib(p){const m={1:['🔴','p1'],2:['🟡','p2'],3:['⚪','p3']};const[e,c]=m[p]||['⚪','p3'];return`<span class="badge bd-${c}">${e}</span>`;}
function nowStr(){return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}

async function loadAll(){
  try{
    [prospects,inboxEmails,playbook]=await Promise.all([
      req('GET','/prospects'),
      req('GET','/inbox/emails'),
      req('GET','/playbook')
    ]);
    setStatus(true);applyFilters();render();
  }catch(e){setStatus(false);document.getElementById('main').innerHTML=`<div class="empty"><div class="ei">⚠️</div><h3>Can't reach server</h3><p style="color:var(--rd)">${e.message}</p><button class="btn bp" onclick="loadAll()">Retry</button></div>`;}
}

function applyFilters(){
  const q=(document.getElementById('srch')||{}).value?.toLowerCase()||'';
  const st=(document.getElementById('fStatus')||{}).value||'';
  const pl=(document.getElementById('fPlatform')||{}).value||'';
  const pr=(document.getElementById('fPriority')||{}).value||'';
  const lt=(document.getElementById('fLeadType')||{}).value||'';
  const so=(document.getElementById('fSort')||{}).value||'created_at';
  filtered=prospects.filter(p=>{
    if(st&&p.status!==st)return false;
    if(pl&&p.platform!==pl)return false;
    if(pr&&String(p.priority)!==pr)return false;
    if(lt&&(p.lead_type||'')!==lt)return false;
    if(q){if(![p.name,p.email,p.phone,p.notes,p.source,p.lead_type,p.profile_url].join(' ').toLowerCase().includes(q))return false;}
    return true;
  });
  filtered.sort((a,b)=>{
    if(so==='name')return a.name.localeCompare(b.name);
    if(so==='score')return(b.total_score||0)-(a.total_score||0);
    if(so==='audience')return(b.audience_size||0)-(a.audience_size||0);
    if(so==='deal_value')return(b.deal_value||0)-(a.deal_value||0);
    return new Date(b.created_at)-new Date(a.created_at);
  });
  const ctag=document.getElementById('ctag');if(ctag)ctag.textContent=filtered.length+' contact'+(filtered.length!==1?'s':'');
}

function go(pg){
  page=pg;editId=null;closeDP();
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(b=>{if(b.getAttribute('onclick')?.includes(`'${pg}'`))b.classList.add('on');});
  const titles={dashboard:'Dashboard',analytics:'Analytics',pipeline:'Pipeline',inbox:'Inbox',reid:'Ask Reid',globaldata:'Global Data',playbook:'Playbook',admin:'Admin'};
  document.getElementById('pgtitle').textContent=titles[pg]||pg;
  const showTbar=['pipeline','globaldata'].includes(pg);
  document.getElementById('tbar').style.display=showTbar?'flex':'none';
  document.getElementById('addBtn').style.display=pg==='pipeline'?'flex':'none';
  document.getElementById('vtoggle').style.display=pg==='pipeline'?'flex':'none';
  if(pg==='pipeline'){if(sub!=='kanban'&&sub!=='table')sub='table';updateVbtns();}
  applyFilters();render();
}

function setSub(v){sub=v;updateVbtns();render();}
function updateVbtns(){['kanban','table'].forEach(v=>{const b=document.getElementById(v==='kanban'?'vkb':'vtbl');if(b)b.classList.toggle('on',v===sub);});}

function render(){
  if(page==='dashboard')renderDash();
  else if(page==='analytics')renderAnalytics();
  else if(page==='pipeline'){if(sub==='kanban')renderKanban();else renderTable();}
  else if(page==='inbox')renderInbox();
  else if(page==='reid')renderReid();
  else if(page==='globaldata')renderGlobalData();
  else if(page==='playbook')renderPlaybook();
  else if(page==='admin')renderAdmin();
}

// ─── DASHBOARD ──────────────────────────────────────────────
function renderDash(){
  const total=prospects.length;
  const activeAffiliates=prospects.filter(p=>p.lead_type==='Active Affiliate Partner').length;
  const potentialAffiliates=prospects.filter(p=>p.lead_type==='Potential Affiliate Partner').length;
  const totalDealVal=prospects.reduce((s,p)=>s+(p.deal_value||0),0);
  const totalCom=prospects.reduce((s,p)=>s+(p.deal_value||0)*(p.commission_pct||10)/100,0);
  const won=prospects.filter(p=>p.status==='closed_won').length;
  const outreachSent=prospects.filter(p=>['outreach_sent','lead','qualified','call_booked','follow_up','closed_won'].includes(p.status)).length;
  const inPipeline=prospects.filter(p=>['lead','qualified','call_booked','follow_up'].includes(p.status)).length;
  const recent=prospects.slice(0,8);
  const funnelData=Object.entries(STAGES).map(([key,info])=>({key,label:info.l,color:info.c,count:prospects.filter(p=>p.status===key).length}));
  const maxF=Math.max(...funnelData.map(f=>f.count),1);
  // Channel breakdown computed locally
  const _chMap={};
  prospects.forEach(p=>{
    if(!p.platform||p.platform==='')return;
    const ch=p.platform;
    if(!_chMap[ch])_chMap[ch]={platform:ch,total:0,stages:{},dealValue:0};
    _chMap[ch].total+=1;
    _chMap[ch].stages[p.status]=(_chMap[ch].stages[p.status]||0)+1;
    _chMap[ch].dealValue+=(p.deal_value||0);
  });
  const byChannel=Object.values(_chMap).sort((a,b)=>b.total-a.total);
  document.getElementById('main').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-val">${total}</div><div class="kpi-lbl">Total Prospects</div></div>
      <div class="kpi gr"><div class="kpi-val gr">${activeAffiliates}</div><div class="kpi-lbl">Active Affiliates</div><div class="kpi-sub">${potentialAffiliates} potential</div></div>
      <div class="kpi yw"><div class="kpi-val yw">${fmtC(totalDealVal)}</div><div class="kpi-lbl">Total Deal Value</div></div>
      <div class="kpi gr"><div class="kpi-val gr">${fmtC(totalCom)}</div><div class="kpi-lbl">Total Commission</div></div>
      <div class="kpi"><div class="kpi-val ac">${outreachSent}</div><div class="kpi-lbl">Outreach Sent</div></div>
      <div class="kpi"><div class="kpi-val">${inPipeline}</div><div class="kpi-lbl">In Pipeline</div><div class="kpi-sub">lead → follow up</div></div>
      <div class="kpi or"><div class="kpi-val" style="color:var(--or)">${won}</div><div class="kpi-lbl">Closed Won</div></div>
    </div>
    <div class="funnel-bar">
      <h3>Pipeline Breakdown</h3>
      ${funnelData.map(f=>{const w=Math.max(Math.round(f.count/maxF*100),f.count?2:0);return`<div class="fb-row"><div class="fb-lbl">${f.label}</div><div class="fb-track"><div class="fb-fill" style="width:${w}%;background:${f.color}">${f.count>0&&w>12?f.count:''}</div></div><div class="fb-count">${f.count}</div></div>`;}).join('')}
    </div>
    <div style="padding:0 20px 14px">
      <div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:10px">Pipeline by Channel</div>
      <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden">
        ${byChannel.length?byChannel.map(ch=>{
          const pct=Math.round(ch.total/Math.max(total,1)*100);
          const wonCount=ch.stages['closed_won']||0;
          return`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer" onclick="filterByChannel('${ch.platform}')">
            <span class="badge bd-${ch.platform}">${ch.platform}</span>
            <div style="flex:1;background:var(--bg3);border-radius:3px;height:6px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:var(--ac);border-radius:3px"></div>
            </div>
            <div style="font-size:12px;color:var(--t2);width:20px;text-align:right">${ch.total}</div>
            ${ch.dealValue?`<div style="font-size:11px;color:var(--gr);width:55px;text-align:right">${fmtC(ch.dealValue)}</div>`:'<div style="width:55px"></div>'}
            ${wonCount?`<div style="font-size:10px;color:var(--gr)">✅ ${wonCount} won</div>`:''}
          </div>`;
        }).join(''):'<div style="padding:20px;text-align:center;color:var(--t3);font-size:12px">No channel data yet — add contacts with platform info</div>'}
      </div>
    </div>
    <div style="padding:0 20px 6px">
      <div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
        Recent Contacts
        <button class="btn bg xsm" onclick="go('pipeline')">View All →</button>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden">
        ${recent.length?recent.map(p=>`
          <div style="display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--bd);cursor:pointer" onclick="go('pipeline');setTimeout(()=>openDetail('${p.id}'),50)">
            <div style="width:30px;height:30px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0">${(p.name||'?')[0].toUpperCase()}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:500">${p.name}</div>
              <div style="font-size:11px;color:var(--t3)">${p.lead_type||p.platform||''}</div>
            </div>
            ${sb(p.status)}
            ${p.deal_value?`<div style="font-size:12px;color:var(--gr);font-weight:600">${fmtC(p.deal_value)}</div>`:''}
            <div style="font-size:11px;color:var(--t3)">${ago(p.created_at)}</div>
          </div>`).join(''):`<div class="empty" style="padding:28px"><p>No contacts yet — <button class="btn bp sm" onclick="go('pipeline');setTimeout(openAdd,100)">Add First</button></p></div>`}
      </div>
    </div>`;
}

// ─── ANALYTICS ──────────────────────────────────────────────
async function renderAnalytics(){
  document.getElementById('main').innerHTML='<div class="load"><div class="spin"></div>Loading…</div>';
  let s;
  try{s=await req('GET','/stats');}catch(e){document.getElementById('main').innerHTML=`<div class="empty"><div class="ei">⚠️</div><h3>Failed</h3><p>${e.message}</p><button class="btn bp" onclick="go('analytics')">Retry</button></div>`;return;}
  const bySt=s.byStatus||[],byPl=s.byPlatform||[];
  const maxP=Math.max(...byPl.map(x=>x.c),1);
  const funnelData=[
    {stage:'Total',count:s.total||0,color:'#5a6070'},
    {stage:'Outreach Sent',count:s.outreachSent||0,color:'#4f7ef8'},
    {stage:'Responded',count:s.responded||0,color:'#ff8c5a'},
    {stage:'Qualified',count:s.qualified||0,color:'#f5b731'},
    {stage:'Call Booked',count:s.callBooked||0,color:'#9b6dff'},
    {stage:'Closed Won',count:s.wonDeals||0,color:'#22c88a'},
  ];
  const maxF=Math.max(funnelData[0].count,1);
  document.getElementById('main').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-val">${s.total||0}</div><div class="kpi-lbl">Total Prospects</div></div>
      <div class="kpi gr"><div class="kpi-val gr">${s.activeAffiliates||0}</div><div class="kpi-lbl">Active Affiliates</div></div>
      <div class="kpi yw"><div class="kpi-val yw">${fmtC(s.totalDealValue)}</div><div class="kpi-lbl">Total Deal Value</div></div>
      <div class="kpi gr"><div class="kpi-val gr">${fmtC(s.totalCommission)}</div><div class="kpi-lbl">Total Commission</div></div>
      <div class="kpi"><div class="kpi-val ac">${s.outreachSent||0}</div><div class="kpi-lbl">Outreach Sent</div></div>
      <div class="kpi or"><div class="kpi-val" style="color:var(--or)">${s.wonDeals||0}</div><div class="kpi-lbl">Closed Won</div></div>
    </div>
    <div class="charts">
      <div class="cc" style="grid-column:1/-1">
        <div class="ct2">🔻 Conversion Funnel</div>
        ${funnelData.map((f,i)=>{
          const w=Math.max(Math.round(f.count/maxF*100),f.count?1:0);
          const pct=i>0&&funnelData[i-1].count>0?Math.round(f.count/funnelData[i-1].count*100)+'%':'—';

function ds(e){dragId=e.currentTarget.dataset.id;setTimeout(()=>{if(e.currentTarget)e.currentTarget.style.opacity='.35';},0);}
function dov(e){e.preventDefault();e.currentTarget.closest('.kc')?.classList.add('drag-over');}
function dlv(e){e.currentTarget.closest('.kc')?.classList.remove('drag-over');}
async function drp(e,ns){
  e.preventDefault();e.currentTarget.closest('.kc')?.classList.remove('drag-over');
  if(!dragId)return;
  const p=prospects.find(x=>x.id===dragId);if(!p||p.status===ns){dragId=null;return;}
  try{await req('PATCH','/prospects/'+dragId,{status:ns});p.status=ns;toast('→ '+STAGES[ns]?.l,'ok');applyFilters();if(document.getElementById('dp').classList.contains('on'))openDetail(dragId);}
  catch{toast('Move failed','err');}
  dragId=null;
}

  const msgs=document.getElementById('chatMsgs');if(msgs)msgs.scrollTop=msgs.scrollHeight;
  const inp=document.getElementById('chatIn');
  if(inp){inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,120)+'px';});}
}
function renderChatMsg(m){
  return`<div class="chat-msg ${m.role}">
    <div class="chat-avatar ${m.role}">${m.role==='reid'?'R':'A'}</div>
    <div>
      <div class="chat-bubble">${m.text}</div>
      <div class="chat-meta">${m.time||nowStr()}</div>
    </div>
  </div>`;
}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}
async function sendChat(){
  const inp=document.getElementById('chatIn');
  if(!inp)return;
  const msg=inp.value.trim();if(!msg)return;
  inp.value='';inp.style.height='auto';
  const time=nowStr();
  chatHistory.push({role:'user',text:msg,time});
  const msgs=document.getElementById('chatMsgs');
  if(msgs){msgs.innerHTML+=renderChatMsg({role:'user',text:msg,time});msgs.scrollTop=msgs.scrollHeight;}
  const btn=document.getElementById('chatSend');if(btn)btn.disabled=true;
  // Show typing indicator
  const typingId='typing-'+Date.now();
  if(msgs){msgs.innerHTML+=`<div class="chat-msg reid" id="${typingId}"><div class="chat-avatar reid">R</div><div><div class="chat-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div></div>`;msgs.scrollTop=msgs.scrollHeight;}
  const stats={total:prospects.length,active:prospects.filter(p=>p.lead_type==='Active Affiliate Partner').length,stages:Object.entries(STAGES).map(([k])=>({stage:k,count:prospects.filter(p=>p.status===k).length})),totalDealValue:prospects.reduce((s,p)=>s+(p.deal_value||0),0)};
  const fullPrompt=`[CRM Context: ${prospects.length} total prospects, ${stats.active} active affiliates, $${stats.totalDealValue} total deal value]\n\n${chatHistory.slice(-6).map(m=>(m.role==='user'?'Aubtin':'Reid')+': '+m.text).join('\n')}\n\nAubtin: ${msg}`;
  try{
    const r=await req('POST','/analyze',{
      prompt:fullPrompt
    });
    let replyText=r.analysis||'something went wrong on my end, try again';
    replyText=await executeReidActions(replyText);
    const replyTime=nowStr();
    chatHistory.push({role:'reid',text:replyText,time:replyTime});
    const typingEl=document.getElementById(typingId);if(typingEl)typingEl.remove();
    if(msgs){msgs.innerHTML+=renderChatMsg({role:'reid',text:replyText,time:replyTime});msgs.scrollTop=msgs.scrollHeight;}
  }catch(e){
    const typingEl=document.getElementById(typingId);if(typingEl)typingEl.remove();
    const errText='error: '+e.message;
    chatHistory.push({role:'reid',text:errText,time:nowStr()});
    if(msgs){msgs.innerHTML+=renderChatMsg({role:'reid',text:errText,time:nowStr()});msgs.scrollTop=msgs.scrollHeight;}
  }
  if(btn)btn.disabled=false;
}

// ─── CSV ─────────────────────────────────────────────────────
function importCSV(){const i=document.createElement('input');i.type='file';i.accept='.csv';i.onchange=e=>handleCSV(e.target.files[0]);i.click();}
function parseCSV(txt){
  const lines=txt.trim().split('\n');
  const hdrs=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[\s"']+/g,'_').replace(/[^a-z0-9_]/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(let c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=c;}
    vals.push(cur.trim());
    const o={};hdrs.forEach((h,i)=>{o[h]=(vals[i]||'').replace(/^"|"$/g,'').trim();});return o;
  });
}
async function handleCSV(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const rows=parseCSV(e.target.result);
    const records=rows.map(r=>({name:r.name||r.handle||r.creator||r.brand||'',handle:r.handle||r.username||'',platform:r.platform||'',email:r.email||'',phone:r.phone||'',audience_size:parseInt(r.audience_size||r.followers||0)||0,fit_score:parseInt(r.fit_score||r.score||0)||0,profile_url:r.profile_url||r.url||'',status:r.status||'prospect',priority:parseInt(r.priority)||3,notes:r.notes||'',content_focus:r.content_focus||r.niche||'',source:r.source||'csv-import',lead_type:r.lead_type||'Potential Affiliate Partner',deal_value:parseFloat(r.deal_value)||0,commission_pct:parseFloat(r.commission_pct)||10})).filter(r=>r.name||r.handle);
    if(!records.length){toast('No valid rows','err');return;}
    if(!confirm(`Import ${records.length} contacts?`))return;
    try{const res=await req('POST','/prospects/bulk',{records});prospects=await req('GET','/prospects');toast(`Imported ${res.added} contacts`,'ok');applyFilters();render();}
    catch(e){toast('Import failed: '+e.message,'err');}
  };
  reader.readAsText(file);
}
function exportCSV(){
  const cols=['name','handle','platform','lead_type','status','priority','deal_value','commission_pct','audience_size','total_score','email','phone','content_focus','source','notes','profile_url','created_at'];
  const data=filtered.length?filtered:prospects;
  const rows=data.map(p=>cols.map(c=>{const v=String(p[c]??'').replace(/"/g,'""');return v.includes(',')||v.includes('"')||v.includes('\n')?`"${v}"`:v;}).join(','));
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent([cols.join(','),...rows].join('\n'));
  a.download='apex-affiliates-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  toast(`Exported ${rows.length} records`);
}

// ─── EMAIL TAGS ──────────────────────────────────────────────
const TAG_OPTIONS = ['Lead','Qualified','Call Booked','Follow Up','Closed Won','Closed Lost'];
const TAG_CLASSES = {'Lead':'etag-lead','Qualified':'etag-qualified','Call Booked':'etag-call_booked','Follow Up':'etag-follow_up','Closed Won':'etag-closed_won','Closed Lost':'etag-closed_lost'};

function renderEmailTags(emailId, tags) {
  const tagHtml = (tags||[]).map(t => `<span class="etag ${TAG_CLASSES[t]||''}" onclick="removeEmailTag('${emailId}','${t}')" title="Click to remove">${t} ×</span>`).join('');
  const addBtn = `<span class="etag etag-add" onclick="showTagPicker('${emailId}')">+ Tag</span>`;
  return `<div class="email-tags" id="etags-${emailId}" style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">${tagHtml}${addBtn}</div>`;
}

function showTagPicker(emailId) {
  const email = inboxEmails.find(e => e.id === emailId);
  const existing = email?.tags || [];
  const available = TAG_OPTIONS.filter(t => !existing.includes(t));
  if (!available.length) { toast('All tags applied'); return; }
  const menu = document.createElement('div');
  menu.style.cssText = 'position:fixed;z-index:200;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--shd);min-width:140px;padding:4px 0';
  available.forEach(tag => {
    const item = document.createElement('div');
    item.style.cssText = 'padding:7px 12px;font-size:12px;cursor:pointer;color:var(--t2)';
    item.textContent = tag;
    item.onmouseover = () => item.style.background = 'var(--bg4)';
    item.onmouseout = () => item.style.background = '';
    item.onclick = () => { addEmailTag(emailId, tag); document.body.removeChild(menu); };
    menu.appendChild(item);
  });
  const btn = document.querySelector(`#etags-${emailId} .etag-add`);
  if (btn) { const r = btn.getBoundingClientRect(); menu.style.top = (r.bottom + 4) + 'px'; menu.style.left = r.left + 'px'; }
  else { menu.style.top = '50%'; menu.style.left = '50%'; }
  document.body.appendChild(menu);
  setTimeout(() => document.addEventListener('click', () => { if(document.body.contains(menu)) document.body.removeChild(menu); }, { once: true }), 10);
}

async function addEmailTag(emailId, tag) {
  const email = inboxEmails.find(e => e.id === emailId);
  if (!email) return;
  const tags = [...new Set([...(email.tags||[]), tag])];
  try {
    await req('PATCH', '/inbox/emails/' + emailId + '/tags', { tags });
    email.tags = tags;
    const container = document.getElementById('etags-' + emailId);
    if (container) container.outerHTML = renderEmailTags(emailId, tags);
    toast(tag + ' tag added', 'ok');
  } catch(e) { toast('Failed', 'err'); }
}

async function removeEmailTag(emailId, tag) {
  const email = inboxEmails.find(e => e.id === emailId);
  if (!email) return;
  const tags = (email.tags||[]).filter(t => t !== tag);
  try {
    await req('PATCH', '/inbox/emails/' + emailId + '/tags', { tags });
    email.tags = tags;
    const container = document.getElementById('etags-' + emailId);
    if (container) container.outerHTML = renderEmailTags(emailId, tags);
  } catch(e) { toast('Failed', 'err'); }
}

async function executeReidActions(responseText) {
  const actionRegex = /<<ACTION:(\w+)>>([\s\S]*?)<<END_ACTION>>/g;
  let match;
  let cleanText = responseText;
  const actions = [];
  while ((match = actionRegex.exec(responseText)) !== null) {
    actions.push({ type: match[1], data: match[2].trim() });
    cleanText = cleanText.replace(match[0], '').trim();
  }
  for (const action of actions) {
    try {
      const data = JSON.parse(action.data);
      if (action.type === 'create_contact') {
        const r = await req('POST', '/prospects', {
          name: data.name || 'Unknown',
          email: data.email || '',
          phone: data.phone || '',
          platform: data.platform || '',
          lead_type: data.lead_type || 'Potential Affiliate Partner',
          profile_url: data.profile_url || '',
          audience_size: data.audience_size || 0,
          deal_value: data.deal_value || 0,
          status: data.status || 'prospect',
          priority: data.priority || 3,
          notes: data.notes || '',
          iap_score: 0
        });
        prospects.unshift({ ...data, id: r.id, total_score: 0, created_at: new Date().toISOString() });
        applyFilters();
        toast('✅ ' + (data.name || 'Contact') + ' added to pipeline', 'ok');
      }
      if (action.type === 'update_contact') {
        const p = prospects.find(x => x.name?.toLowerCase().includes(data.name?.toLowerCase()));
        if (p) {
          await req('PATCH', '/prospects/' + p.id, data);
          Object.assign(p, data);
          applyFilters();
          toast('Updated ' + p.name, 'ok');
        }
      }
    } catch(e) {
      console.error('Reid action failed:', action.type, e.message);
    }
  }
  return cleanText;
}
