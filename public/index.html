<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Affiliates</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--sb:#0f1117;--sbh:#1a1d27;--sba:#1e2230;--sbb:#1e2230;--sbt:#8b8fa8;--sbta:#e2e4ed;--bg:#14161f;--bg2:#1a1d27;--bg3:#1e2230;--bg4:#242838;--bd:#2a2d3d;--t:#e2e4ed;--t2:#9096b0;--t3:#5a5f78;--ac:#4f7ef8;--acb:rgba(79,126,248,.12);--gr:#22c88a;--grb:rgba(34,200,138,.12);--rd:#f0545c;--rdb:rgba(240,84,92,.12);--yw:#f5b731;--ywb:rgba(245,183,49,.12);--pu:#9b6dff;--pub:rgba(155,109,255,.12);--or:#ff8c5a;--orb:rgba(255,140,90,.12);--shd:0 8px 32px rgba(0,0,0,.5);--r:8px;--rl:12px;--sw:220px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);font-size:14px;height:100vh;display:flex;overflow:hidden}
.sb{width:var(--sw);background:var(--sb);border-right:1px solid var(--sbb);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:18px 14px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--sbb)}
.sb-logo-ic{width:30px;height:30px;background:var(--ac);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sb-logo-t{font-size:14px;font-weight:700;color:var(--t)}
.sb-logo-s{font-size:10px;color:var(--t3);margin-top:1px}
.sb-sec{padding:10px 8px 4px}
.sb-sec-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:0 8px;margin-bottom:3px}
.ni{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r);color:var(--sbt);font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:var(--sbh);color:var(--sbta)}
.ni.on{background:var(--sba);color:var(--sbta)}
.ni .ic{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-ft{margin-top:auto;padding:10px 8px;border-top:1px solid var(--sbb)}
.sp{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:var(--r);background:var(--bg3);font-size:11px;color:var(--t3)}
.sd{width:6px;height:6px;border-radius:50%;background:var(--gr);flex-shrink:0}
.sd.off{background:var(--rd)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:10px;padding:0 20px;height:50px;border-bottom:1px solid var(--bd);background:var(--bg);flex-shrink:0}
.tb-title{font-size:15px;font-weight:600;color:var(--t)}
.tb-sub{font-size:12px;color:var(--t3);margin-left:2px}
.tb-sp{flex:1}
.sw{position:relative}
.sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.si{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:6px 9px 6px 30px;font-size:13px;font-family:inherit;color:var(--t);outline:none;width:200px}
.si:focus{border-color:var(--ac)}
.si::placeholder{color:var(--t3)}
.tbar{display:flex;align-items:center;gap:7px;padding:9px 20px;border-bottom:1px solid var(--bd);flex-shrink:0}
.fs{padding:5px 9px;border:1px solid var(--bd);border-radius:var(--r);font-size:12px;font-family:inherit;background:var(--bg2);color:var(--t2);outline:none;cursor:pointer}
.ct{font-size:12px;color:var(--t3);margin-left:4px}
.vt{display:flex;gap:2px;margin-left:auto}
.vb{padding:4px 8px;border:1px solid var(--bd);background:var(--bg2);color:var(--t3);border-radius:6px;font-size:12px;cursor:pointer}
.vb.on{background:var(--bg4);color:var(--t)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .12s;border:none}
.bp{background:var(--ac);color:#fff}.bp:hover{background:#3d6de5}
.bg{background:var(--bg2);color:var(--t2);border:1px solid var(--bd)}.bg:hover{background:var(--bg3);color:var(--t)}
.bd2{background:transparent;color:var(--rd);border:1px solid var(--bd)}.bd2:hover{background:var(--rdb)}
.bsm{padding:3px 9px;font-size:11px}
.bxsm{padding:2px 7px;font-size:11px}
.ca{flex:1;overflow:hidden;display:flex}
.cs{flex:1;overflow-y:auto}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bd-discovered{background:rgba(90,95,120,.2);color:var(--t3)}
.bd-contacted{background:var(--acb);color:var(--ac)}
.bd-responded{background:var(--pub);color:var(--pu)}
.bd-qualified{background:var(--ywb);color:var(--yw)}
.bd-closed_won{background:var(--grb);color:var(--gr)}
.bd-closed_lost{background:var(--rdb);color:var(--rd)}
.bd-p1{background:var(--rdb);color:var(--rd)}
.bd-p2{background:var(--ywb);color:var(--yw)}
.bd-p3{background:rgba(90,95,120,.12);color:var(--t3)}
.bd-tiktok{background:rgba(105,125,248,.15);color:#8da4f5}
.bd-instagram{background:rgba(225,100,160,.15);color:#e080b8}
.bd-youtube{background:rgba(240,80,80,.15);color:#f07070}
.bd-linkedin{background:rgba(10,102,194,.15);color:#5a9fd4}
.bd-twitter{background:rgba(29,161,242,.15);color:#52aaed}
.bd-podcast{background:var(--orb);color:var(--or)}
.bd-newsletter{background:var(--grb);color:var(--gr)}
.bd-other{background:rgba(90,95,120,.12);color:var(--t3)}
/* deal stages */
.bd-proposal{background:var(--acb);color:var(--ac)}
.bd-negotiation{background:var(--pub);color:var(--pu)}
.bd-contract_sent{background:var(--ywb);color:var(--yw)}
.bd-closed_won{background:var(--grb);color:var(--gr)}
.bd-closed_lost{background:var(--rdb);color:var(--rd)}
/* Table */
.tw{padding:0}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:5}
th{padding:8px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd);background:var(--bg2);cursor:pointer;white-space:nowrap}
th:hover{color:var(--t2)}
td{padding:10px 14px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.018)}
.tdn{font-weight:600;color:var(--t)}
.tdl{color:var(--ac);text-decoration:none;font-size:12px}
.tdl:hover{text-decoration:underline}
/* Kanban */
.kb{display:flex;gap:12px;padding:14px 20px;height:100%;overflow-x:auto;align-items:flex-start}
.kc{flex:0 0 220px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);display:flex;flex-direction:column;max-height:calc(100vh - 160px)}
.kh{padding:10px 12px 8px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--bd)}
.kd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kt{font-size:12px;font-weight:600;color:var(--t2);flex:1}
.kn{font-size:11px;background:var(--bg3);color:var(--t3);border-radius:10px;padding:1px 7px}
.kcards{flex:1;overflow-y:auto;padding:8px 8px 4px;display:flex;flex-direction:column;gap:7px}
.kcard{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:11px;cursor:pointer;transition:all .12s}
.kcard:hover{border-color:var(--ac);background:var(--bg4)}
.kcard-n{font-size:13px;font-weight:600;color:var(--t);margin-bottom:3px}
.kcard-h{font-size:11px;color:var(--t3);margin-bottom:7px}
.kcard-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.kcard-aud{font-size:11px;color:var(--t3)}
.kadd{margin:6px 8px 8px;padding:6px;background:none;border:1px dashed var(--bd);border-radius:var(--r);color:var(--t3);font-size:12px;cursor:pointer;text-align:center;font-family:inherit;width:calc(100% - 16px)}
.kadd:hover{border-color:var(--t2);color:var(--t2);background:var(--bg3)}
.drag-over{border-color:var(--ac)!important;background:rgba(79,126,248,.05)!important}
/* Stats */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;padding:20px;padding-bottom:0}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px}
.sv{font-size:28px;font-weight:700;color:var(--t)}
.sv.ac{color:var(--ac)}.sv.gr{color:var(--gr)}.sv.yw{color:var(--yw)}
.sl{font-size:12px;color:var(--t3);margin-top:2px}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 20px}
.cc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px}
.ct2{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:12px}
.br{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:12px}
.bl{width:90px;color:var(--t3);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bw{flex:1;background:var(--bg3);border-radius:4px;height:6px;overflow:hidden}
.bf{height:100%;border-radius:4px;background:var(--ac)}
.bf.gr{background:var(--gr)}
.bc{color:var(--t3);width:22px;text-align:right;flex-shrink:0}
/* Detail panel */
.dp{width:370px;flex-shrink:0;border-left:1px solid var(--bd);background:var(--bg);overflow-y:auto;display:none;flex-direction:column}
.dp.on{display:flex}
.dph{padding:14px 16px;border-bottom:1px solid var(--bd)}
.dph h2{font-size:16px;font-weight:700;color:var(--t);margin-bottom:7px}
.dph .tags{display:flex;gap:5px;flex-wrap:wrap}
.dpc{float:right;background:none;border:none;color:var(--t3);cursor:pointer;font-size:17px;padding:2px 5px;border-radius:4px;margin-top:-2px}
.dpc:hover{background:var(--bg3)}
.dpb{padding:14px 16px;flex:1}
.dsec{margin-bottom:18px}
.dsec h4{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:9px}
.df{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--bd);gap:8px}
.df:last-child{border:none}
.dl{font-size:12px;color:var(--t3);flex-shrink:0;width:95px}
.dv{font-size:13px;color:var(--t);text-align:right;flex:1}
.dv a{color:var(--ac);text-decoration:none}
.ssel{width:100%;padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--bg3);color:var(--t);outline:none;cursor:pointer}
.nta{width:100%;padding:9px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--bg3);color:var(--t);resize:vertical;min-height:85px;outline:none}
.nta:focus{border-color:var(--ac)}
.nta::placeholder{color:var(--t3)}
.ai{display:flex;gap:7px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px}
.ai:last-child{border:none}
.ad{width:6px;height:6px;border-radius:50%;background:var(--t3);margin-top:4px;flex-shrink:0}
.at{flex:1;color:var(--t3)}
.atime{font-size:11px;color:var(--t3);flex-shrink:0}
.dpa{padding:11px 16px;border-top:1px solid var(--bd);display:flex;gap:7px;flex-wrap:wrap}
/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.ov.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shd)}
.mh{padding:18px 22px 0;display:flex;align-items:center;justify-content:space-between}
.mt{font-size:16px;font-weight:600;color:var(--t)}
.mc{background:none;border:none;font-size:20px;color:var(--t3);cursor:pointer;padding:3px 6px;border-radius:5px;line-height:1}
.mc:hover{background:var(--bg3);color:var(--t)}
.mb{padding:16px 22px;display:flex;flex-direction:column;gap:13px}
.fi{display:flex;flex-direction:column;gap:4px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fi label{font-size:12px;font-weight:500;color:var(--t3)}
.fi input,.fi select,.fi textarea{padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--bg3);color:var(--t);outline:none}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--ac)}
.fi input::placeholder,.fi textarea::placeholder{color:var(--t3)}
.fi textarea{resize:vertical;min-height:75px}
.fi select option{background:var(--bg2)}
.mf{padding:4px 22px 18px;display:flex;justify-content:flex-end;gap:8px}
/* Inbox */
.iitem{display:flex;align-items:flex-start;gap:11px;padding:13px 20px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.iitem:hover{background:var(--bg2)}
.iav{width:34px;height:34px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--t2);flex-shrink:0;text-transform:uppercase}
.ib{flex:1;min-width:0}
.iname{font-size:13px;font-weight:600;color:var(--t)}
.isubj{font-size:12px;color:var(--t2);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.isnip{font-size:12px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.imeta{text-align:right;flex-shrink:0}
.itime{font-size:11px;color:var(--t3)}
.iunread{width:7px;height:7px;border-radius:50%;background:var(--ac);margin:5px 0 0 auto}
/* Ask Reid */
.reid-wrap{padding:20px}
.reid-msg{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:13px 15px;margin-bottom:10px}
.reid-msg-txt{font-size:13px;color:var(--t);line-height:1.6;margin-bottom:7px}
.reid-msg-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--t3)}
.reid-status{display:inline-flex;padding:1px 8px;border-radius:10px;font-size:10px;font-weight:600}
.rs-pending{background:var(--ywb);color:var(--yw)}
.rs-done{background:var(--grb);color:var(--gr)}
.rs-sent{background:var(--acb);color:var(--ac)}
.reid-compose{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px}
.reid-compose h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--t)}
/* Playbook */
.pb-item{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;margin-bottom:10px}
.pb-title{font-size:14px;font-weight:600;color:var(--t);margin-bottom:6px}
.pb-content{font-size:13px;color:var(--t2);line-height:1.7;white-space:pre-wrap}
.pb-cat{font-size:11px;color:var(--t3);margin-top:8px}
/* Admin */
.admin-wrap{padding:20px}
.admin-section{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:18px 20px;margin-bottom:14px}
.admin-section h3{font-size:14px;font-weight:600;color:var(--t);margin-bottom:12px}
.kv{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px}
.kv:last-child{border:none}
.kv .lbl{color:var(--t3)}
.kv .val{color:var(--t);font-family:monospace;font-size:12px;background:var(--bg3);padding:2px 8px;border-radius:4px}
/* Global data */
.gd-wrap{padding:0}
/* Import */
.imp-drop{border:2px dashed var(--bd);border-radius:var(--rl);padding:28px;text-align:center;color:var(--t3);cursor:pointer;transition:all .2s}
.imp-drop:hover,.imp-drop.dov{border-color:var(--ac);background:var(--acb);color:var(--ac)}
.imp-drop input{display:none}
/* Toast */
.toasts{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px}
.toast{padding:9px 14px;border-radius:var(--r);background:var(--bg4);color:var(--t);font-size:13px;border:1px solid var(--bd);box-shadow:var(--shd);animation:tIn .2s ease;max-width:260px}
.toast.ok{border-color:var(--gr);color:var(--gr)}.toast.err{border-color:var(--rd);color:var(--rd)}
@keyframes tIn{from{transform:translateX(14px);opacity:0}to{transform:translateX(0);opacity:1}}
.load{display:flex;align-items:center;justify-content:center;height:160px;color:var(--t3);gap:9px}
.spin{width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.es{text-align:center;padding:70px 20px;color:var(--t3)}
.es .ei{font-size:44px;margin-bottom:12px}
.es h3{font-size:17px;color:var(--t2);margin-bottom:7px}
.es p{font-size:13px;margin-bottom:18px}
</style>
</head>
<body>
<div class="sb">
  <div class="sb-logo">
    <div class="sb-logo-ic">🔺</div>
    <div><div class="sb-logo-t">Apex Affiliates</div><div class="sb-logo-s">Partner CRM</div></div>
  </div>
  <div class="sb-sec">
    <div class="sb-sec-lbl">Overview</div>
    <button class="ni on" onclick="go('dashboard')"><span class="ic">⊞</span> Dashboard</button>
    <button class="ni" onclick="go('analytics')"><span class="ic">📈</span> Analytics</button>
  </div>
  <div class="sb-sec">
    <div class="sb-sec-lbl">Pipeline</div>
    <button class="ni" onclick="go('pipeline')"><span class="ic">◎</span> New Partner Pipeline</button>
    <button class="ni" onclick="go('partners')"><span class="ic">👥</span> Current Partners</button>
    <button class="ni" onclick="go('deals')"><span class="ic">💰</span> Deals</button>
  </div>
  <div class="sb-sec">
    <div class="sb-sec-lbl">Comms</div>
    <button class="ni" onclick="go('inbox')"><span class="ic">✉️</span> Inbox</button>
    <button class="ni" onclick="go('reid')"><span class="ic">🤖</span> Ask Reid</button>
  </div>
  <div class="sb-sec">
    <div class="sb-sec-lbl">Data & Tools</div>
    <button class="ni" onclick="go('globaldata')"><span class="ic">🌐</span> Global Data</button>
    <button class="ni" onclick="go('playbook')"><span class="ic">📖</span> Playbook</button>
    <button class="ni" onclick="go('admin')"><span class="ic">⚙️</span> Admin</button>
  </div>
  <div class="sb-ft">
    <div class="sp"><div class="sd" id="sdot"></div><span id="stxt" style="font-size:12px">Connecting…</span></div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="tb-title" id="pgtitle">Dashboard</div>
    <div class="tb-sp"></div>
    <div class="sw">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="si" id="srch" placeholder="Search…" oninput="applyFilters()">
    </div>
    <button class="btn bp" id="addBtn" onclick="openAdd()">+ Add Partner</button>
  </div>
  <div class="tbar" id="tbar">
    <select class="fs" id="fStatus" onchange="applyFilters()">
      <option value="">All Stages</option>
      <option value="discovered">Discovered</option><option value="contacted">Contacted</option>
      <option value="responded">Responded</option><option value="qualified">Qualified</option>
      <option value="closed_won">Closed Won</option><option value="closed_lost">Closed Lost</option>
    </select>
    <select class="fs" id="fPlatform" onchange="applyFilters()">
      <option value="">All Platforms</option>
      <option>TikTok</option><option>Instagram</option><option>YouTube</option>
      <option>LinkedIn</option><option>Twitter</option><option>Podcast</option><option>Newsletter</option><option>Other</option>
    </select>
    <select class="fs" id="fPriority" onchange="applyFilters()">
      <option value="">All Priorities</option>
      <option value="1">🔴 High</option><option value="2">🟡 Medium</option><option value="3">⚪ Low</option>
    </select>
    <select class="fs" id="fSort" onchange="applyFilters()">
      <option value="created_at">Newest</option><option value="name">Name A–Z</option>
      <option value="score">Score</option><option value="audience">Audience</option>
    </select>
    <span class="ct" id="ctag">0 partners</span>

  </div>
  <div class="ca">

</div>

<div class="ov" id="dealMod">
  <div class="modal">

      <div class="fi"><label>Partner Name *</label><input id="dname" placeholder="Partner or company name"></div>

<div class="toasts" id="toasts"></div>
<script>
const API = window.location.origin;
const KEY = 'apex-agent-secret-change-me';
let prospects=[], filtered=[], deals=[], inboxEmails=[], reidMsgs=[], playbook=[];
let page='dashboard', sub='table', editId=null, editDealId=null, dragId=null, csvData=null;

const STAGES={discovered:{l:'Discovered',e:'🔍',c:'#5a5f78'},contacted:{l:'Contacted',e:'📤',c:'#4f7ef8'},responded:{l:'Responded',e:'💬',c:'#9b6dff'},qualified:{l:'Qualified',e:'⭐',c:'#f5b731'},closed_won:{l:'Closed Won',e:'✅',c:'#22c88a'},closed_lost:{l:'Closed Lost',e:'❌',c:'#f0545c'}};
const DEAL_STAGES={proposal:{l:'Proposal',c:'#4f7ef8'},negotiation:{l:'Negotiation',c:'#9b6dff'},contract_sent:{l:'Contract Sent',c:'#f5b731'},closed_won:{l:'Closed Won',c:'#22c88a'},closed_lost:{l:'Closed Lost',c:'#f0545c'}};

async function req(m,p,b){const o={method:m,headers:{'x-api-key':KEY,'Content-Type':'application/json'}};if(b)o.body=JSON.stringify(b);const r=await fetch(API+p,o);if(!r.ok)throw new Error(await r.text());return r.json();}
function toast(msg,t=''){const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;document.getElementById('toasts').appendChild(el);setTimeout(()=>el.remove(),3200);}
function setStatus(ok){document.getElementById('sdot').className='sd'+(ok?'':' off');document.getElementById('stxt').textContent=ok?'Connected':'Offline';}
function fmt(n){if(!n)return'—';n=parseInt(n);if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return n.toLocaleString();}
function fmtD(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtC(n){if(!n)return'—';return'$'+Number(n).toLocaleString();}
function ago(d){if(!d)return'';const s=(Date.now()-new Date(d))/1000;if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function sb(s){const st=STAGES[s]||{l:s,e:''};return`<span class="badge bd-${s}">${st.e} ${st.l}</span>`;}
function db(s){const ds=DEAL_STAGES[s]||{l:s};return`<span class="badge bd-${s}">${ds.l}</span>`;}
function pb(p){if(!p)return'';return`<span class="badge bd-${(p||'').toLowerCase()}">${p}</span>`;}
function prib(p){const m={1:['🔴','High','p1'],2:['🟡','Med','p2'],3:['⚪','Low','p3']};const[e,l,c]=m[p]||['⚪','—','p3'];return`<span class="badge bd-${c}">${e} ${l}</span>`;}

async function loadAll(){
  try{
    [prospects,deals,inboxEmails,reidMsgs,playbook]=await Promise.all([req('GET','/prospects'),req('GET','/deals'),req('GET','/inbox/emails'),req('GET','/reid/messages'),req('GET','/playbook')]);
    setStatus(true);applyFilters();
  }catch(e){setStatus(false);document.getElementById('main').innerHTML=`<div class="es"><div class="ei">⚠️</div><h3>Can't reach server</h3><p style="color:var(--rd)">${e.message}</p></div>`;}
}

function applyFilters(){
  const q=document.getElementById('srch').value.toLowerCase();
  const st=document.getElementById('fStatus').value;
  const pl=document.getElementById('fPlatform').value;
  const pr=document.getElementById('fPriority').value;
  const so=document.getElementById('fSort').value;
  filtered=prospects.filter(p=>{
    if(st&&p.status!==st)return false;
    if(pl&&p.platform!==pl)return false;
    if(pr&&String(p.priority)!==pr)return false;
    if(q){const h=[p.name,p.handle,p.email,p.content_focus,p.notes,p.source].join(' ').toLowerCase();if(!h.includes(q))return false;}
    return true;
  });
  filtered.sort((a,b)=>{if(so==='name')return a.name.localeCompare(b.name);if(so==='score')return(b.total_score||0)-(a.total_score||0);if(so==='audience')return(b.audience_size||0)-(a.audience_size||0);return new Date(b.created_at)-new Date(a.created_at);});
  document.getElementById('ctag').textContent=filtered.length+' partner'+(filtered.length!==1?'s':'');
  render();
}

function go(pg){
  page=pg;editId=null;closeDP();
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(b=>{if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes(`'${pg}'`))b.classList.add('on');});
  const titles={dashboard:'Dashboard',analytics:'Analytics',pipeline:'New Partner Pipeline',partners:'Current Partners',deals:'Deals',inbox:'Inbox',reid:'Ask Reid',globaldata:'Global Data',playbook:'Playbook',admin:'Admin'};
  document.getElementById('pgtitle').textContent=titles[pg]||pg;
  const showTbar=['pipeline','partners','globaldata'].includes(pg);
  document.getElementById('tbar').style.display=showTbar?'flex':'none';
  document.getElementById('addBtn').style.display=['pipeline','partners'].includes(pg)?'flex':'none';
  document.getElementById('vtoggle').style.display=pg==='partners'?'flex':'none';
  if(pg==='pipeline'){sub='kanban';updateVbtns();}
  if(['pipeline','partners','globaldata'].includes(pg))applyFilters();
  else render();
}

function setSub(v){sub=v;updateVbtns();render();}
function updateVbtns(){['kanban','table'].forEach(v=>{const b=document.getElementById(v==='kanban'?'vkb':'vtbl');if(b)b.classList.toggle('on',v===sub);});}

function render(){
  if(page==='dashboard')renderDash();
  else if(page==='analytics')renderAnalytics();
  else if(page==='pipeline')renderKanban();
  else if(page==='partners'){if(sub==='table')renderTable();else renderKanban();}
  else if(page==='deals')renderDeals();
  else if(page==='inbox')renderInbox();
  else if(page==='reid')renderReid();
  else if(page==='globaldata')renderGlobalData();
  else if(page==='playbook')renderPlaybook();
  else if(page==='admin')renderAdmin();
}

// ─── DASHBOARD ─────────────────────────────────────────────
function renderDash(){
  const won=prospects.filter(p=>p.status==='closed_won').length;
  const contacted=prospects.filter(p=>['contacted','responded','qualified','closed_won'].includes(p.status)).length;
  const dealWon=deals.filter(d=>d.stage==='closed_won');
  const totalCom=dealWon.reduce((s,d)=>s+(d.commission_value||0),0);
  const recent=prospects.slice(0,8);
  document.getElementById('main').innerHTML=`
    <div class="sg">
      <div class="sc"><div class="sv">${prospects.length}</div><div class="sl">Total Prospects</div></div>
      <div class="sc"><div class="sv ac">${contacted}</div><div class="sl">In Pipeline</div></div>
      <div class="sc"><div class="sv gr">${won}</div><div class="sl">Closed Won</div></div>
      <div class="sc"><div class="sv yw">${deals.length}</div><div class="sl">Active Deals</div></div>
      <div class="sc"><div class="sv gr">${fmtC(totalCom)}</div><div class="sl">Total Commission</div></div>
      <div class="sc"><div class="sv">${inboxEmails.length}</div><div class="sl">Inbox Emails</div></div>
    </div>
    <div style="padding:14px 20px">
      <div style="font-size:13px;font-weight:600;color:var(--t2);margin-bottom:12px">Recent Activity</div>
      <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden">
        ${recent.length?recent.map(p=>`
          <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer" onclick="go('partners');setTimeout(()=>openDetail('${p.id}'),100)">
            <div style="width:32px;height:32px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--t2);flex-shrink:0">${(p.name||'?')[0].toUpperCase()}</div>
            <div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--t)">${p.name}</div><div style="font-size:11px;color:var(--t3)">${p.handle?'@'+p.handle:p.platform||''}</div></div>
            <div>${sb(p.status)}</div>
            <div style="font-size:11px;color:var(--t3)">${ago(p.created_at)}</div>
          </div>`).join(''):'<div style="text-align:center;padding:30px;color:var(--t3);font-size:13px">No prospects yet — add your first one</div>'}
      </div>
    </div>`;
}

// ─── ANALYTICS ─────────────────────────────────────────────
async function renderAnalytics(){
  document.getElementById('main').innerHTML='<div class="load"><div class="spin"></div> Loading…</div>';
  let s;
  try{s=await req('GET','/stats');}catch(e){document.getElementById('main').innerHTML=`<div class="es"><div class="ei">⚠️</div><h3>Failed</h3><p>${e.message}</p></div>`;return;}
  const bySt=s.byStatus||[],byPl=s.byPlatform||[];
  const maxS=Math.max(...bySt.map(x=>x.c),1),maxP=Math.max(...byPl.map(x=>x.c),1);
  document.getElementById('main').innerHTML=`
    <div class="sg">
      <div class="sc"><div class="sv">${s.total||0}</div><div class="sl">Total Prospects</div></div>
      <div class="sc"><div class="sv ac">${s.outreachSent||0}</div><div class="sl">Outreach Sent</div></div>
      <div class="sc"><div class="sv">${s.responded||0}</div><div class="sl">Responded</div></div>
      <div class="sc"><div class="sv gr">${s.wonDeals||0}</div><div class="sl">Won Deals</div></div>
      <div class="sc"><div class="sv yw">${fmtC(s.totalDealValue)}</div><div class="sl">Total Deal Value</div></div>
      <div class="sc"><div class="sv gr">${fmtC(s.totalCommission)}</div><div class="sl">Total Commission</div></div>
    </div>
    <div class="charts">
      <div class="cc"><div class="ct2">By Stage</div>${bySt.sort((a,b)=>b.c-a.c).map(x=>`<div class="br"><div class="bl">${STAGES[x.status]?.l||x.status}</div><div class="bw"><div class="bf" style="width:${Math.round(x.c/maxS*100)}%;background:${STAGES[x.status]?.c||'var(--ac)'}"></div></div><div class="bc">${x.c}</div></div>`).join('')}</div>
      <div class="cc"><div class="ct2">By Platform</div>${byPl.sort((a,b)=>b.c-a.c).slice(0,8).map(x=>`<div class="br"><div class="bl">${x.platform||'Unknown'}</div><div class="bw"><div class="bf gr" style="width:${Math.round(x.c/maxP*100)}%"></div></div><div class="bc">${x.c}</div></div>`).join('')}</div>
    </div>`;
}

// ─── KANBAN ──────────────────────────────────────────────────
function renderKanban(){
  const cols=Object.entries(STAGES).map(([key,info])=>{
    const cards=filtered.filter(p=>p.status===key);
    const ch=cards.map(p=>`
      <div class="kcard" draggable="true" data-id="${p.id}" ondragstart="ds(event)" onclick="openDetail('${p.id}')">
        <div class="kcard-n">${p.name}</div>
        <div class="kcard-h">${p.handle?'@'+p.handle:(p.email||'—')}</div>
        <div class="kcard-tags">${pb(p.platform)} ${prib(p.priority)}</div>
        ${p.audience_size?`<div class="kcard-aud">👥 ${fmt(p.audience_size)}</div>`:''}
      </div>`).join('');
    return`<div class="kc" data-status="${key}" ondragover="dov(event)" ondragleave="dlv(event)" ondrop="drp(event,'${key}')">
      <div class="kh"><div class="kd" style="background:${info.c}"></div><div class="kt">${info.l}</div><div class="kn">${cards.length}</div></div>
      <div class="kcards">${ch||'<div style="text-align:center;color:var(--t3);font-size:12px;padding:10px">Empty</div>'}</div>
      <button class="kadd" onclick="openAdd('${key}')">+ Add</button>
    </div>`;
  }).join('');
  document.getElementById('main').innerHTML=`<div class="kb">${cols}</div>`;
}
function ds(e){dragId=e.currentTarget.dataset.id;setTimeout(()=>{if(e.currentTarget)e.currentTarget.style.opacity='.4';},0);}
function dov(e){e.preventDefault();e.currentTarget.closest('.kc').classList.add('drag-over');}
function dlv(e){e.currentTarget.closest('.kc').classList.remove('drag-over');}
async function drp(e,ns){
  e.preventDefault();e.currentTarget.closest('.kc').classList.remove('drag-over');
  if(!dragId)return;
  const p=prospects.find(x=>x.id===dragId);
  if(!p||p.status===ns){dragId=null;return;}
  try{await req('PATCH','/prospects/'+dragId,{status:ns});p.status=ns;toast('Moved to '+STAGES[ns].l,'ok');applyFilters();if(document.getElementById('dp').classList.contains('on'))openDetail(dragId);}catch{toast('Failed','err');}
  dragId=null;
}

// ─── TABLE ───────────────────────────────────────────────────
function renderTable(){
  if(!filtered.length){document.getElementById('main').innerHTML=`<div class="es"><div class="ei">👥</div><h3>${prospects.length?'No matches':'No partners yet'}</h3><p>${prospects.length?'Try adjusting filters.':'Add your first partner.'}</p>${!prospects.length?'<button class="btn bp" onclick="openAdd()">+ Add Partner</button>':''}</div>`;return;}
  const rows=filtered.map(p=>`
    <tr onclick="openDetail('${p.id}')" style="cursor:pointer">
      <td class="tdn">${p.name}</td>
      <td>${p.handle?`<a class="tdl" href="${p.profile_url||'#'}" target="_blank" onclick="event.stopPropagation()">@${p.handle}</a>`:'—'}</td>
      <td>${pb(p.platform)}</td><td>${sb(p.status)}</td><td>${prib(p.priority)}</td>
      <td style="color:var(--t2)">${fmt(p.audience_size)}</td>
      <td style="color:var(--t2)">${p.total_score?p.total_score+'%':'—'}</td>
      <td style="color:var(--t3);font-size:12px">${p.email||'—'}</td>
      <td style="color:var(--t3);font-size:12px">${ago(p.created_at)}</td>
      <td onclick="event.stopPropagation()"><button class="btn bg bsm" onclick="openEdit('${p.id}')">Edit</button></td>
    </tr>`).join('');
  document.getElementById('main').innerHTML=`<div class="tw"><table><thead><tr><th>Name</th><th>Handle</th><th>Platform</th><th>Stage</th><th>Priority</th><th>Audience</th><th>Score</th><th>Email</th><th>Added</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ─── DEALS ───────────────────────────────────────────────────
function renderDeals(){
  const rows=deals.map(d=>`
    <tr>
      <td class="tdn">${d.prospect_name}</td>
      <td>${db(d.stage)}</td>
      <td style="color:var(--t)">${fmtC(d.value)}</td>
      <td style="color:var(--gr)">${fmtC(d.commission_value)}</td>
      <td style="color:var(--t3);font-size:12px">${d.commission_pct||10}%</td>
      <td style="color:var(--t3);font-size:12px">${fmtD(d.close_date)}</td>
      <td style="color:var(--t3);font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.notes||'—'}</td>
      <td><button class="btn bg bsm" onclick="openEditDeal('${d.id}')">Edit</button> <button class="btn bd2 bxsm" onclick="deleteDeal('${d.id}')">✕</button></td>
    </tr>`).join('');
  const totVal=deals.reduce((s,d)=>s+(d.value||0),0);
  const totCom=deals.reduce((s,d)=>s+(d.commission_value||0),0);
  document.getElementById('main').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0">
      <div style="display:flex;gap:20px">
        <span style="font-size:13px;color:var(--t3)">Total Value: <strong style="color:var(--t)">${fmtC(totVal)}</strong></span>
        <span style="font-size:13px;color:var(--t3)">Total Commission: <strong style="color:var(--gr)">${fmtC(totCom)}</strong></span>
      </div>
      <button class="btn bp" onclick="openAddDeal()">+ Add Deal</button>
    </div>
    <div style="padding:12px 20px 0">
      ${deals.length?`<div class="tw"><table><thead><tr><th>Partner</th><th>Stage</th><th>Value</th><th>Commission</th><th>%</th><th>Close Date</th><th>Notes</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="es"><div class="ei">💰</div><h3>No deals yet</h3><p>Add a deal to track revenue.</p><button class="btn bp" onclick="openAddDeal()">+ Add Deal</button></div>'}
    </div>`;
}

function openAddDeal(){
  editDealId=null;
  document.getElementById('dmTitle').textContent='Add Deal';
  document.getElementById('dsavBtn').textContent='Add Deal';
  ['dname','dval','dclose','dno'].forEach(f=>{const el=document.getElementById(f);if(el)el.value='';});
  document.getElementById('dpct').value='10';
  document.getElementById('dst').value='proposal';
  document.getElementById('dealMod').classList.add('on');
}
function openEditDeal(id){
  const d=deals.find(x=>x.id===id);if(!d)return;
  editDealId=id;
  document.getElementById('dmTitle').textContent='Edit Deal';
  document.getElementById('dsavBtn').textContent='Save Changes';
  document.getElementById('dname').value=d.prospect_name||'';
  document.getElementById('dval').value=d.value||'';
  document.getElementById('dpct').value=d.commission_pct||10;
  document.getElementById('dst').value=d.stage||'proposal';
  document.getElementById('dclose').value=d.close_date||'';
  document.getElementById('dno').value=d.notes||'';
  document.getElementById('dealMod').classList.add('on');
}
async function saveDeal(){
  const name=document.getElementById('dname').value.trim();
  if(!name){toast('Partner name required','err');return;}
  const data={prospect_name:name,value:parseFloat(document.getElementById('dval').value)||0,commission_pct:parseFloat(document.getElementById('dpct').value)||10,stage:document.getElementById('dst').value,close_date:document.getElementById('dclose').value,notes:document.getElementById('dno').value.trim()};
  const btn=document.getElementById('dsavBtn');btn.disabled=true;btn.textContent='Saving…';
  try{
    if(editDealId){const u=await req('PATCH','/deals/'+editDealId,data);const i=deals.findIndex(x=>x.id===editDealId);if(i>=0)deals[i]={...deals[i],...u};toast('Deal updated','ok');}
    else{const r=await req('POST','/deals',data);deals.unshift({...data,id:r.id,commission_value:(data.value*data.commission_pct/100),created_at:new Date().toISOString()});toast('Deal added','ok');}
    closeMod('dealMod');renderDeals();
  }catch(e){toast('Save failed: '+e.message,'err');}
  finally{btn.disabled=false;btn.textContent=editDealId?'Save Changes':'Add Deal';}
}
async function deleteDeal(id){
  if(!confirm('Delete this deal?'))return;
  try{await req('DELETE','/deals/'+id);deals=deals.filter(d=>d.id!==id);toast('Deleted');renderDeals();}catch{toast('Failed','err');}
}

// ─── INBOX ───────────────────────────────────────────────────
function renderInbox(){
  const all=[...inboxEmails].sort((a,b)=>new Date(b.date||b.created_at)-new Date(a.date||a.created_at));
  const header=`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--bd)"><div style="font-size:13px;color:var(--t3)">${all.length} emails from Reid's account</div><button class="btn bg bsm" onclick="syncInbox()">🔄 Sync Gmail</button></div>`;
  if(!all.length){document.getElementById('main').innerHTML=header+`<div class="es"><div class="ei">✉️</div><h3>Inbox empty</h3><p>Click "Sync Gmail" to pull emails from Reid's account.</p></div>`;return;}
  const items=all.map(e=>`
    <div class="iitem" onclick="showEmail('${e.id}')">
      <div class="iav">${(e.from_name||e.from||'?')[0].toUpperCase()}</div>
      <div class="ib">
        <div class="iname">${e.from_name||e.from||'Unknown'}</div>
        <div class="isubj">${e.subject||'(no subject)'}</div>
        <div class="isnip">${(e.snippet||e.body||'').slice(0,80)}</div>
      </div>
      <div class="imeta">
        <div class="itime">${ago(e.date||e.created_at)}</div>
        ${e.unread?'<div class="iunread"></div>':''}
      </div>
    </div>`).join('');
  document.getElementById('main').innerHTML=header+`<div>${items}</div>`;
}
async function syncInbox(){
  toast('Syncing Gmail…');
  try{
    const result=await fetch('/inbox/sync',{method:'POST',headers:{'x-api-key':KEY}});
    const data=await result.json();
    inboxEmails=await req('GET','/inbox/emails');
    toast(`Synced ${data.added||0} new emails`,'ok');
    renderInbox();
  }catch{toast('Sync triggered — refresh in a moment','ok');}
}
function showEmail(id){
  const e=inboxEmails.find(x=>x.id===id);if(!e)return;
  const dp=document.getElementById('dp');dp.classList.add('on');
  dp.innerHTML=`
    <div class="dph">
      <button class="dpc" onclick="closeDP()">×</button>
      <h2 style="font-size:15px">${e.subject||'(no subject)'}</h2>
      <div class="tags" style="margin-top:6px">
        <span style="font-size:12px;color:var(--t3)">From: ${e.from_name||''} &lt;${e.from||''}&gt;</span>

// ─── ASK REID ────────────────────────────────────────────────
function renderReid(){
  const msgs=reidMsgs.slice(0,20);
  const compose=`
    <div class="reid-compose">
      <h3>Send instruction to Reid</h3>
      <textarea class="nta" id="reidInput" placeholder="Tell Reid what to do: 'Send follow-up to @username', 'Draft outreach for top 10 TikTok prospects', etc." style="min-height:100px"></textarea>
      <div style="margin-top:10px;display:flex;gap:8px">
        <button class="btn bp" onclick="sendToReid()">Send to Reid</button>
        <select class="fs" id="reidType"><option value="instruction">Instruction</option><option value="outreach">Outreach Request</option><option value="followup">Follow-up Request</option><option value="research">Research Task</option></select>
      </div>
    </div>`;
  const history=msgs.length?msgs.map(m=>`
    <div class="reid-msg">
      <div class="reid-msg-txt">${m.message}</div>
      <div class="reid-msg-meta">
        <span class="reid-status rs-${m.status||'pending'}">${m.status||'pending'}</span>
        <span>${m.type||'instruction'}</span>
        <span>${ago(m.created_at)}</span>
        ${m.status==='pending'?`<button class="btn bg bxsm" onclick="markReidDone('${m.id}')">Mark Done</button>`:''}
      </div>
    </div>`):'<div style="font-size:13px;color:var(--t3);text-align:center;padding:20px">No instructions sent yet</div>';
  document.getElementById('main').innerHTML=`
    <div class="reid-wrap">
      ${compose}
      <div style="font-size:13px;font-weight:600;color:var(--t2);margin:18px 0 10px">Recent Instructions</div>
      ${history.join('')}
    </div>`;
}
async function sendToReid(){
  const msg=document.getElementById('reidInput').value.trim();
  if(!msg){toast('Enter an instruction','err');return;}
  const type=document.getElementById('reidType').value;
  try{
    const r=await req('POST','/reid/messages',{message:msg,type});
    reidMsgs.unshift({id:r.id,message:msg,type,status:'pending',created_at:new Date().toISOString()});
    document.getElementById('reidInput').value='';
    toast('Sent to Reid','ok');renderReid();
  }catch(e){toast('Failed: '+e.message,'err');}
}
async function markReidDone(id){
  try{await req('PATCH','/reid/messages/'+id,{status:'done'});const m=reidMsgs.find(x=>x.id===id);if(m)m.status='done';toast('Marked done','ok');renderReid();}catch{toast('Failed','err');}
}

// ─── CSV IMPORT / EXPORT ─────────────────────────────────────
function importCSV(){
  const input=document.createElement('input');input.type='file';input.accept='.csv';
  input.onchange=e=>handleCSVFile(e.target.files[0]);
  input.click();
}
function parseCSV(txt){
  const lines=txt.trim().split('\n');
  const hdrs=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/\s+/g,'_').replace(/['"]/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=line.match(/("(?:[^"]|"")*"|[^,]*)/g)||[];
    const o={};hdrs.forEach((h,i)=>{o[h]=(vals[i]||'').replace(/^"|"$/g,'').replace(/""/g,'"').trim();});return o;
  });
}
async function handleCSVFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const rows=parseCSV(e.target.result);
    const records=rows.map(r=>({name:r.name||r.handle||r.creator||r.influencer||'',handle:r.handle||r.username||'',platform:r.platform||'',audience_size:parseInt(r.audience_size||r.followers||0)||0,email:r.email||'',profile_url:r.profile_url||r.url||'',status:r.status||'discovered',priority:parseInt(r.priority)||3,fit_score:parseInt(r.fit_score||r.score||r.iap_score||0)||0,notes:r.notes||'',content_focus:r.content_focus||r.niche||'',source:r.source||'csv-import'})).filter(r=>r.name||r.handle);
    if(!records.length){toast('No valid rows found','err');return;}
    if(!confirm(`Import ${records.length} records?`))return;
    try{const res=await req('POST','/prospects/bulk',{records});prospects=await req('GET','/prospects');toast(`Imported ${res.added} contacts`,'ok');applyFilters();}catch(e){toast('Import failed: '+e.message,'err');}
  };
  reader.readAsText(file);
}
function exportCSV(){
  const cols=['name','handle','platform','status','priority','audience_size','total_score','email','content_focus','outreach_type','source','notes','profile_url','created_at'];
  const rows=(filtered.length?filtered:prospects).map(p=>cols.map(c=>{const v=String(p[c]??'').replace(/"/g,'""');return v.includes(',')||v.includes('"')?`"${v}"`:v;}).join(','));
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent([cols.join(','),...rows].join('\n'));
  a.download='apex-affiliates-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  toast(`Exported ${rows.length} records`);
}

async function saveNotes(id){

// ─── ADD / EDIT ───────────────────────────────────────────────
function openAdd(st='discovered'){
  editId=null;
  document.getElementById('mTitle').textContent='Add Partner';
  document.getElementById('savBtn').textContent='Add Partner';
  ['fn','fh','fem','faud','fsc','furl','fcf','fno'].forEach(f=>{const el=document.getElementById(f);if(el)el.value='';});
  document.getElementById('fst').value=st;
  document.getElementById('fpri').value='3';
  document.getElementById('fp').value='';
  document.getElementById('addMod').classList.add('on');
  setTimeout(()=>document.getElementById('fn').focus(),80);
}
function openEdit(id){
  const p=prospects.find(x=>x.id===id);if(!p)return;
  editId=id;
  document.getElementById('mTitle').textContent='Edit Partner';
  document.getElementById('savBtn').textContent='Save Changes';
  document.getElementById('fn').value=p.name||'';
  document.getElementById('fh').value=p.handle||'';
  document.getElementById('fem').value=p.email||'';
  document.getElementById('faud').value=p.audience_size||'';
  document.getElementById('fsc').value=p.total_score||'';
  document.getElementById('furl').value=p.profile_url||'';
  document.getElementById('fcf').value=p.content_focus||'';
  document.getElementById('fno').value=p.notes||'';
  document.getElementById('fst').value=p.status||'discovered';
  document.getElementById('fpri').value=p.priority||3;
  document.getElementById('fp').value=p.platform||'';
  document.getElementById('addMod').classList.add('on');
}
async function saveContact(){
  const name=document.getElementById('fn').value.trim();
  if(!name){toast('Name required','err');return;}
  const data={name,handle:document.getElementById('fh').value.trim(),email:document.getElementById('fem').value.trim(),platform:document.getElementById('fp').value,audience_size:parseInt(document.getElementById('faud').value)||0,iap_score:parseInt(document.getElementById('fsc').value)||0,profile_url:document.getElementById('furl').value.trim(),content_focus:document.getElementById('fcf').value.trim(),notes:document.getElementById('fno').value.trim(),status:document.getElementById('fst').value,priority:parseInt(document.getElementById('fpri').value)||3};
  const btn=document.getElementById('savBtn');btn.disabled=true;btn.textContent='Saving…';
  try{
    if(editId){const u=await req('PATCH','/prospects/'+editId,data);const i=prospects.findIndex(x=>x.id===editId);if(i>=0)prospects[i]={...prospects[i],...u};toast('Updated!','ok');}
    else{const r=await req('POST','/prospects',data);prospects.unshift({...data,id:r.id,created_at:new Date().toISOString(),updated_at:new Date().toISOString()});toast('Added!','ok');}
    closeMod('addMod');applyFilters();if(editId)openDetail(editId);
  }catch(e){toast('Failed: '+e.message,'err');}
  finally{btn.disabled=false;btn.textContent=editId?'Save Changes':'Add Partner';}
}
async function deleteP(id){
  if(!confirm('Delete this partner? Cannot be undone.'))return;
  try{await req('DELETE','/prospects/'+id);prospects=prospects.filter(x=>x.id!==id);toast('Deleted');closeDP();applyFilters();}catch{toast('Failed','err');}
}
function closeMod(id){document.getElementById(id).classList.remove('on');}
document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('on');}));
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){document.querySelectorAll('.ov.on').forEach(m=>m.classList.remove('on'));closeDP();}
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('srch').focus();}
  if((e.metaKey||e.ctrlKey)&&e.key==='n'){e.preventDefault();openAdd();}
});
go('dashboard');
loadAll();
</script>
