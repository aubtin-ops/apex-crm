<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Affiliates</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   APEX — Apple-inspired Dark Design System
   Inspired by macOS Ventura, Apple Music, Apple Mail
   ═══════════════════════════════════════════════════════════════ */
:root{
  --sb:#161617;--sbh:rgba(255,255,255,.06);--sba:rgba(255,255,255,.1);
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.12);
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--bg4:#48484a;
  --t:rgba(255,255,255,.92);--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.35);
  --ac:#0a84ff;--acb:rgba(10,132,255,.15);
  --gr:#30d158;--grb:rgba(48,209,88,.15);
  --rd:#ff453a;--rdb:rgba(255,69,58,.15);
  --yw:#ffd60a;--ywb:rgba(255,214,10,.15);
  --pu:#bf5af2;--pub:rgba(191,90,242,.15);
  --or:#ff9f0a;--orb:rgba(255,159,10,.15);
  --r:10px;--rl:14px;--sw:240px;
  --shd:0 16px 48px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.3);
  --glass:rgba(44,44,46,.72);--blur:saturate(180%) blur(20px)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','SF Pro Display','SF Pro Text',system-ui,sans-serif;background:var(--bg);color:var(--t);font-size:14px;height:100vh;display:flex;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.01em}
/* ─── Sidebar ─── */
.sb{width:var(--sw);background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:20px 16px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bd)}
.sb-logo-ic{width:32px;height:32px;background:linear-gradient(135deg,#0a84ff,#5e5ce6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;box-shadow:0 2px 8px rgba(10,132,255,.3)}
.sb-logo-t{font-size:14px;font-weight:700;color:var(--t);letter-spacing:-.02em}
.sb-logo-s{font-size:11px;color:var(--t3);font-weight:400}
.sb-sec{padding:10px 10px 4px}
.sb-lbl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:0 8px;margin-bottom:4px}
.ni{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:var(--sbh);color:var(--t)}
.ni.on{background:var(--sba);color:var(--t)}
.ni .ic{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-ft{margin-top:auto;padding:12px 10px;border-top:1px solid var(--bd)}
.sp{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.04);font-size:11px;color:var(--t3)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--gr);flex-shrink:0;box-shadow:0 0 6px rgba(48,209,88,.5)}
.dot.off{background:var(--rd);box-shadow:0 0 6px rgba(255,69,58,.5)}
/* ─── Main ─── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{display:flex;align-items:center;gap:12px;padding:0 24px;height:52px;border-bottom:1px solid var(--bd);background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);flex-shrink:0}
.tb-title{font-size:16px;font-weight:700;letter-spacing:-.02em}
.tb-sp{flex:1}
.swrap{position:relative}
.swrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.sinp{background:rgba(255,255,255,.06);border:1px solid var(--bd);border-radius:8px;padding:6px 10px 6px 30px;font-size:13px;font-family:inherit;color:var(--t);outline:none;width:200px;transition:all .2s}
.sinp:focus{border-color:var(--ac);background:rgba(255,255,255,.08);box-shadow:0 0 0 3px rgba(10,132,255,.2)}
.sinp::placeholder{color:var(--t3)}
.tbar{display:flex;align-items:center;gap:8px;padding:10px 24px;border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap;background:rgba(255,255,255,.02)}
.fs{padding:5px 10px;border:1px solid var(--bd);border-radius:8px;font-size:12px;font-family:inherit;background:rgba(255,255,255,.05);color:var(--t2);outline:none;cursor:pointer;transition:all .15s}
.fs:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(10,132,255,.15)}
.fs option{background:var(--bg2)}
.ctag{font-size:12px;color:var(--t3);margin-left:4px}
.vt{display:flex;gap:1px;margin-left:auto;background:rgba(255,255,255,.06);border-radius:8px;padding:2px;border:1px solid var(--bd)}
.vb{padding:4px 10px;border:none;background:transparent;color:var(--t3);border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.vb.on{background:rgba(255,255,255,.12);color:var(--t);box-shadow:0 1px 3px rgba(0,0,0,.3)}
/* ─── Buttons ─── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);border:none;white-space:nowrap}
.bp{background:var(--ac);color:#fff}.bp:hover{filter:brightness(1.12);transform:translateY(-0.5px)}
.bg{background:rgba(255,255,255,.08);color:var(--t2);border:1px solid var(--bd)}.bg:hover{background:rgba(255,255,255,.12);color:var(--t)}
.bd2{background:transparent;color:var(--rd);border:1px solid rgba(255,69,58,.3)}.bd2:hover{background:var(--rdb)}
.sm{padding:4px 10px;font-size:12px}
.xsm{padding:3px 8px;font-size:11px;border-radius:6px}
.ca{flex:1;overflow:hidden;display:flex}
.cs{flex:1;overflow-y:auto;scroll-behavior:smooth}
/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}
/* ─── Badges ─── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500;white-space:nowrap}
.bd-prospect{background:rgba(255,255,255,.08);color:var(--t3)}
.bd-outreach_sent{background:var(--acb);color:var(--ac)}
.bd-lead{background:var(--orb);color:var(--or)}
.bd-qualified{background:var(--ywb);color:var(--yw)}
.bd-call_booked{background:var(--pub);color:var(--pu)}
.bd-follow_up{background:var(--grb);color:#60d0a0}
.bd-closed_won{background:var(--grb);color:var(--gr)}
.bd-closed_lost{background:var(--rdb);color:var(--rd)}
.bd-affiliate{background:var(--acb);color:#5aadff}
.bd-deal{background:var(--grb);color:var(--gr)}
.bd-p1{background:var(--rdb);color:var(--rd)}
.bd-p2{background:var(--ywb);color:var(--yw)}
.bd-p3{background:rgba(255,255,255,.06);color:var(--t3)}
.bd-TikTok,.bd-tiktok{background:rgba(105,125,248,.12);color:#8da4f5}
.bd-Instagram,.bd-instagram{background:rgba(225,100,160,.12);color:#e080b8}
.bd-YouTube,.bd-youtube{background:rgba(255,69,58,.12);color:#ff7a73}
.bd-LinkedIn,.bd-linkedin{background:rgba(10,102,194,.12);color:#5a9fd4}
.bd-Twitter,.bd-twitter{background:rgba(29,161,242,.12);color:#52aaed}
.bd-Podcast,.bd-podcast{background:var(--orb);color:var(--or)}
.bd-Newsletter,.bd-newsletter{background:var(--grb);color:var(--gr)}
.bd-Other,.bd-other{background:rgba(255,255,255,.06);color:var(--t3)}
/* ─── Table ─── */
table{width:100%;border-collapse:separate;border-spacing:0}
thead{position:sticky;top:0;z-index:5}
th{padding:8px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd);background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);cursor:pointer;white-space:nowrap}
th:hover{color:var(--t2)}
td{padding:10px 14px;border-bottom:1px solid var(--bd);vertical-align:middle;font-size:13px}
tr{transition:background .15s}
tr:hover td{background:rgba(255,255,255,.03)}
.tdn{font-weight:600;color:var(--t)}
.tdl{color:var(--ac);text-decoration:none;font-size:12px}
.tdl:hover{text-decoration:underline}
/* ─── Kanban ─── */
.kb{display:flex;gap:12px;padding:16px 18px;height:100%;overflow-x:auto;align-items:flex-start}
.kc{flex:0 0 210px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);display:flex;flex-direction:column;max-height:calc(100vh - 150px)}
.kh{padding:10px 12px 8px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bd)}
.kd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kt{font-size:12px;font-weight:600;color:var(--t2);flex:1}
.kn{font-size:10px;background:rgba(255,255,255,.08);color:var(--t3);border-radius:10px;padding:2px 7px}
.kcards{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.kcard{background:rgba(255,255,255,.05);border:1px solid var(--bd);border-radius:var(--r);padding:11px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1)}
.kcard:hover{border-color:rgba(255,255,255,.2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.kcard-n{font-size:12px;font-weight:600;color:var(--t);margin-bottom:3px}
.kcard-h{font-size:11px;color:var(--t3);margin-bottom:6px}
.kcard-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.kcard-val{font-size:11px;color:var(--gr);font-weight:600}
.kadd{margin:6px 8px 8px;padding:6px;background:none;border:1px dashed rgba(255,255,255,.12);border-radius:8px;color:var(--t3);font-size:11px;cursor:pointer;text-align:center;font-family:inherit;width:calc(100% - 16px);transition:all .15s}
.kadd:hover{border-color:var(--t2);color:var(--t2);background:rgba(255,255,255,.04)}
.drag-over{border-color:var(--ac)!important;background:rgba(10,132,255,.06)!important}
/* ─── KPI Dashboard ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;padding:24px;padding-bottom:0}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:18px 20px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac);opacity:.8}
.kpi.gr::before{background:var(--gr)}.kpi.yw::before{background:var(--yw)}.kpi.pu::before{background:var(--pu)}.kpi.or::before{background:var(--or)}
.kpi-val{font-size:30px;font-weight:700;color:var(--t);line-height:1;letter-spacing:-.03em}
.kpi-val.ac{color:var(--ac)}.kpi-val.gr{color:var(--gr)}.kpi-val.yw{color:var(--yw)}
.kpi-lbl{font-size:11px;color:var(--t3);margin-top:6px;font-weight:500}
.kpi-sub{font-size:11px;color:var(--t2);margin-top:3px}
/* ─── Funnel ─── */
.funnel-bar{padding:20px 24px}
.funnel-bar h3{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.fb-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.fb-lbl{font-size:11px;color:var(--t3);width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fb-track{flex:1;background:rgba(255,255,255,.06);border-radius:5px;height:20px;overflow:hidden}
.fb-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:600;color:rgba(255,255,255,.9);min-width:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.fb-count{font-size:11px;color:var(--t2);width:30px;text-align:right;flex-shrink:0}
/* ─── Charts ─── */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:16px 24px}
.cc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px}
.ct2{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:12px}
.br{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:12px}
.bl{width:90px;color:var(--t3);flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bw{flex:1;background:rgba(255,255,255,.06);border-radius:4px;height:6px;overflow:hidden}
.bf{height:100%;border-radius:4px;background:var(--ac);transition:width .4s}
.bf.gr{background:var(--gr)}
.bc{color:var(--t3);width:24px;text-align:right;flex-shrink:0}
/* ─── Detail Panel ─── */
.dp{width:380px;flex-shrink:0;border-left:1px solid var(--bd);background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);overflow-y:auto;display:none;flex-direction:column}
.dp.on{display:flex}
.dph{padding:16px 18px;border-bottom:1px solid var(--bd)}
.dph h2{font-size:16px;font-weight:700;color:var(--t);margin-bottom:8px;padding-right:28px;letter-spacing:-.02em}
.dph .tags{display:flex;gap:5px;flex-wrap:wrap}
.dpc{float:right;background:rgba(255,255,255,.08);border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:2px 7px;border-radius:6px;margin-top:-2px;transition:all .15s}
.dpc:hover{background:rgba(255,255,255,.15);color:var(--t)}
.dpb{padding:16px 18px;flex:1}
.dsec{margin-bottom:18px}
.dsec h4{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.df{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--bd);gap:8px}
.df:last-child{border:none}
.dl{font-size:12px;color:var(--t3);flex-shrink:0;width:90px}
.dv{font-size:12px;color:var(--t);text-align:right;flex:1;word-break:break-all}
.dv a{color:var(--ac);text-decoration:none}
.ssel{width:100%;padding:7px 10px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:inherit;background:rgba(255,255,255,.06);color:var(--t);outline:none;transition:all .15s}
.ssel:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(10,132,255,.15)}
.ssel option{background:var(--bg2)}
.nta{width:100%;padding:10px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:inherit;background:rgba(255,255,255,.06);color:var(--t);resize:vertical;min-height:80px;outline:none;transition:all .15s;line-height:1.5}
.nta:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(10,132,255,.15)}
.nta::placeholder{color:var(--t3)}
.ai{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px}
.ai:last-child{border:none}
.ad{width:5px;height:5px;border-radius:50%;background:var(--t3);margin-top:5px;flex-shrink:0}
.at{flex:1;color:var(--t3)}
.atime{font-size:10px;color:var(--t3);flex-shrink:0}
.dpa{padding:12px 18px;border-top:1px solid var(--bd);display:flex;gap:7px;flex-wrap:wrap}
/* ─── Modal ─── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.ov.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;width:560px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:var(--shd)}
.mh{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.mt{font-size:16px;font-weight:700;letter-spacing:-.02em}
.mc{background:rgba(255,255,255,.08);border:none;font-size:16px;color:var(--t3);cursor:pointer;padding:3px 8px;border-radius:6px;line-height:1;transition:all .15s}
.mc:hover{background:rgba(255,255,255,.15);color:var(--t)}
.mb{padding:16px 24px;display:flex;flex-direction:column;gap:12px}
.fi{display:flex;flex-direction:column;gap:5px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.fi label{font-size:12px;font-weight:500;color:var(--t3)}
.fi input,.fi select,.fi textarea{padding:8px 10px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:inherit;background:rgba(255,255,255,.06);color:var(--t);outline:none;transition:all .15s}
.fi input:focus,.fi select:focus,.fi textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(10,132,255,.15)}
.fi input::placeholder,.fi textarea::placeholder{color:var(--t3)}
.fi textarea{resize:vertical;min-height:70px;line-height:1.5}
.fi select option{background:var(--bg2)}
.mf{padding:6px 24px 20px;display:flex;justify-content:flex-end;gap:8px}
.msep{height:1px;background:var(--bd);margin:4px 0}
/* ─── Inbox Items ─── */
.iitem{display:flex;align-items:flex-start;gap:11px;padding:13px 20px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s}
.iitem:hover{background:rgba(255,255,255,.03)}
.iav{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.1),rgba(255,255,255,.05));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--t2);flex-shrink:0;text-transform:uppercase}
.ib{flex:1;min-width:0}
.iname{font-size:13px;font-weight:600}
.isubj{font-size:12px;color:var(--t2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.isnip{font-size:12px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.imeta{text-align:right;flex-shrink:0}
.itime{font-size:11px;color:var(--t3)}
.iunread{width:7px;height:7px;border-radius:50%;background:var(--ac);margin:5px 0 0 auto;box-shadow:0 0 6px rgba(10,132,255,.5)}
/* ─── Reid Chat ─── */
.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.chat-msg{display:flex;align-items:flex-end;gap:9px}
.chat-msg.user{flex-direction:row-reverse}
.chat-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.chat-avatar.reid{background:linear-gradient(135deg,var(--acb),rgba(94,92,230,.15));color:var(--ac);border:1px solid var(--bd)}
.chat-avatar.user{background:rgba(255,255,255,.08);color:var(--t2)}
.chat-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.chat-msg.reid .chat-bubble{background:rgba(255,255,255,.06);border:1px solid var(--bd);border-bottom-left-radius:4px;color:var(--t)}
.chat-msg.user .chat-bubble{background:var(--ac);color:#fff;border-bottom-right-radius:4px}
.chat-meta{font-size:10px;color:var(--t3);margin-top:3px;text-align:right}
.chat-msg.reid .chat-meta{text-align:left}
.chat-input-wrap{padding:14px 20px;border-top:1px solid var(--bd);display:flex;gap:9px;align-items:flex-end;background:rgba(255,255,255,.02)}
.chat-input{flex:1;padding:10px 14px;border:1px solid var(--bd);border-radius:12px;font-size:13px;font-family:inherit;background:rgba(255,255,255,.06);color:var(--t);outline:none;resize:none;min-height:42px;max-height:120px;overflow-y:auto;transition:all .15s;line-height:1.5}
.chat-input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(10,132,255,.15)}
.chat-input::placeholder{color:var(--t3)}
.chat-send{padding:10px 16px;background:var(--ac);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;flex-shrink:0;align-self:flex-end;transition:all .2s}
.chat-send:hover{filter:brightness(1.1);transform:translateY(-0.5px)}
.chat-send:disabled{opacity:.4;cursor:not-allowed;transform:none}
.chat-key-bar{padding:10px 20px;border-bottom:1px solid var(--bd);display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.02)}
.chat-key-bar input{flex:1;padding:6px 10px;border:1px solid var(--bd);border-radius:8px;font-size:12px;font-family:inherit;background:rgba(255,255,255,.06);color:var(--t);outline:none}
.chat-key-bar input:focus{border-color:var(--ac)}
.typing{display:flex;gap:4px;align-items:center;padding:4px 0}
.typing span{width:6px;height:6px;background:var(--t3);border-radius:50%;animation:ty .8s ease infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes ty{0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}
/* ─── Playbook ─── */
.pb-item{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:16px 18px;margin-bottom:10px;transition:all .2s}
.pb-item:hover{border-color:var(--bd2)}
.pb-title{font-size:14px;font-weight:600;margin-bottom:6px;letter-spacing:-.01em}
.pb-content{font-size:13px;color:var(--t2);line-height:1.7;white-space:pre-wrap}
/* ─── Admin ─── */
.admin-section{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:18px 20px;margin-bottom:14px;transition:all .2s}
.admin-section:hover{border-color:var(--bd2)}
.admin-section h3{font-size:14px;font-weight:600;margin-bottom:12px;letter-spacing:-.01em}
.kv{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px}
.kv:last-child{border:none}
.kv .lbl{color:var(--t3)}
.kv .val{color:var(--t);font-family:'SF Mono',SFMono-Regular,ui-monospace,monospace;font-size:11px;background:rgba(255,255,255,.06);padding:3px 8px;border-radius:6px}
/* ─── Toast ─── */
.toasts{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:12px;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);color:var(--t);font-size:13px;border:1px solid var(--bd);box-shadow:var(--shd);animation:tIn .25s cubic-bezier(.4,0,.2,1);max-width:280px}
.toast.ok{border-color:rgba(48,209,88,.3);color:var(--gr)}.toast.err{border-color:rgba(255,69,58,.3);color:var(--rd)}
@keyframes tIn{from{transform:translateY(8px) scale(.96);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
/* ─── Email Tags ─── */
.etag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.etag-lead{background:var(--orb);color:var(--or)}
.etag-qualified{background:var(--ywb);color:var(--yw)}
.etag-call_booked{background:var(--pub);color:var(--pu)}
.etag-follow_up{background:var(--grb);color:#60d0a0}
.etag-closed_won{background:var(--grb);color:var(--gr)}
.etag-closed_lost{background:var(--rdb);color:var(--rd)}
.etag-add{background:rgba(255,255,255,.06);color:var(--t3);border:1px dashed rgba(255,255,255,.15)}
.etag-add:hover{border-color:var(--t2);color:var(--t2);background:rgba(255,255,255,.08)}
/* ─── Loading / Empty ─── */
.load{display:flex;align-items:center;justify-content:center;height:160px;color:var(--t3);gap:9px}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:80px 24px;color:var(--t3)}
.empty .ei{font-size:44px;margin-bottom:14px}
.empty h3{font-size:17px;color:var(--t2);margin-bottom:8px;font-weight:600;letter-spacing:-.02em}
.empty p{font-size:13px;margin-bottom:18px;line-height:1.5}
/* ─── Reid Inbox ─── */
.reid-inbox-bar{display:flex;align-items:center;gap:10px;padding:14px 24px;border-bottom:1px solid var(--bd);background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
.reid-inbox-stats{display:flex;gap:14px;font-size:12px;color:var(--t3)}
.reid-inbox-stats .stat{display:flex;align-items:center;gap:4px}
.reid-inbox-stats .stat .num{font-weight:700;color:var(--t)}
.inbox-email{border-bottom:1px solid var(--bd);transition:background .15s}
.inbox-email:hover{background:rgba(255,255,255,.03)}
.inbox-header{display:flex;align-items:flex-start;gap:11px;padding:14px 24px;cursor:pointer}
.inbox-draft{background:rgba(10,132,255,.04);border-top:1px solid var(--bd);padding:12px 24px 12px 68px}
.inbox-draft-label{font-size:11px;font-weight:600;color:var(--ac);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.inbox-draft-body{font-size:13px;color:var(--t2);line-height:1.65;white-space:pre-wrap;max-height:80px;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.inbox-draft-body.expanded{max-height:none}
.inbox-draft-actions{display:flex;gap:7px;margin-top:10px;align-items:center}
.inbox-priority{font-size:10px;font-weight:600;padding:3px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
.inbox-priority.high{background:var(--rdb);color:var(--rd)}
.inbox-priority.medium{background:var(--ywb);color:var(--yw)}
.inbox-priority.low{background:rgba(255,255,255,.06);color:var(--t3)}
.inbox-summary{font-size:11px;color:var(--t3);margin-top:3px;font-style:italic}
.inbox-prospect-link{font-size:10px;background:var(--acb);color:var(--ac);padding:3px 7px;border-radius:6px;text-decoration:none;cursor:pointer;transition:all .15s}
.inbox-prospect-link:hover{background:rgba(10,132,255,.25)}
.inbox-filter-bar{display:flex;gap:7px;padding:10px 24px;border-bottom:1px solid var(--bd);align-items:center;flex-wrap:wrap;background:rgba(255,255,255,.02)}
.inbox-filter-btn{padding:5px 12px;border:1px solid var(--bd);background:transparent;color:var(--t3);border-radius:20px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s}
.inbox-filter-btn:hover{border-color:rgba(255,255,255,.2);color:var(--t2);background:rgba(255,255,255,.04)}
.inbox-filter-btn.on{background:var(--acb);color:var(--ac);border-color:rgba(10,132,255,.3)}
.processing-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.processing-card{background:var(--bg2);border:1px solid var(--bd2);border-radius:20px;padding:36px 48px;text-align:center;box-shadow:var(--shd)}
.processing-card .spin{width:28px;height:28px;margin:0 auto 16px;border-width:2.5px}
.inbox-follow-up{background:var(--orb);border-left:3px solid var(--or)}
</style>
</head>

<script>
const API = window.location.origin;
const KEY = 'apex-reid-09cb60b5048e1df0';
let prospects=[], filtered=[], inboxEmails=[], playbook=[], chatHistory=[], emailDrafts=[];
let page='dashboard', sub='table', editId=null, dragId=null;

const STAGES = {
  prospect:     {l:'Prospect',     e:'🎯', c:'#5a6070'},
  outreach_sent:{l:'Outreach Sent',e:'📤', c:'#4f7ef8'},
  lead:         {l:'Lead',         e:'🔥', c:'#ff8c5a'},
  qualified:    {l:'Qualified',    e:'⭐', c:'#f5b731'},
  call_booked:  {l:'Call Booked',  e:'📞', c:'#9b6dff'},
  follow_up:    {l:'Follow Up',    e:'🔄', c:'#60d0a0'},
  closed_won:   {l:'Closed Won',   e:'✅', c:'#22c88a'},
  closed_lost:  {l:'Closed Lost',  e:'❌', c:'#f0545c'},
};

async function req(m,p,b){
  const o={method:m,headers:{'x-api-key':KEY,'Content-Type':'application/json'}};
  if(b)o.body=JSON.stringify(b);
  const r=await fetch(API+p,o);
  if(!r.ok){const txt=await r.text();throw new Error(txt);}
  return r.json();
}
function toast(msg,t=''){const el=document.createElement('div');el.className='toast '+t;el.textContent=msg;document.getElementById('toasts').appendChild(el);setTimeout(()=>el.remove(),3200);}
function setStatus(ok){document.getElementById('sdot').className='dot'+(ok?'':' off');document.getElementById('stxt').textContent=ok?'Connected':'Offline';}
function fmt(n){if(!n)return'—';n=parseInt(n);if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return n.toLocaleString();}
function fmtD(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtC(n){if(!n&&n!==0)return'—';if(n===0)return'$0';return'$'+Number(n).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});}
function ago(d){if(!d)return'';const s=(Date.now()-new Date(d))/1000;if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function sb(s){const st=STAGES[s]||{l:s,e:'•'};return`<span class="badge bd-${s}">${st.e} ${st.l}</span>`;}
function pb(p){if(!p)return'';return`<span class="badge bd-${p}">${p}</span>`;}
function ltb(lt){if(!lt)return'';const colors={'Potential Affiliate Partner':'rgba(79,126,248,.12)','Active Affiliate Partner':'rgba(34,200,138,.12)','Deal/Close':'rgba(245,183,49,.12)'};const textColors={'Potential Affiliate Partner':'#7a9ff5','Active Affiliate Partner':'#22c88a','Deal/Close':'#f5b731'};const bg=colors[lt]||'rgba(90,95,120,.12)';const tc=textColors[lt]||'#7a7f98';return`<span class="badge" style="background:${bg};color:${tc}">${lt}</span>`;}
function prib(p){const m={1:['🔴','p1'],2:['🟡','p2'],3:['⚪','p3']};const[e,c]=m[p]||['⚪','p3'];return`<span class="badge bd-${c}">${e}</span>`;}
function nowStr(){return new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}

async function loadAll(){
  try{
    [prospects,inboxEmails,playbook,emailDrafts]=await Promise.all([
      req('GET','/prospects'),
      req('GET','/inbox/emails'),
      req('GET','/playbook'),
      req('GET','/inbox/drafts')
    ]);
    setStatus(true);applyFilters();updateInboxBadge();render();
  }catch(e){setStatus(false);document.getElementById('main').innerHTML=`<div class="empty"><div class="ei">⚠️</div><h3>Can't reach server</h3><p style="color:var(--rd)">${e.message}</p><button class="btn bp" onclick="loadAll()">Retry</button></div>`;}
}

function applyFilters(){
  const q=(document.getElementById('srch')||{}).value?.toLowerCase()||'';
  const st=(document.getElementById('fStatus')||{}).value||'';
  const pl=(document.getElementById('fPlatform')||{}).value||'';
  const pr=(document.getElementById('fPriority')||{}).value||'';
  const lt=(document.getElementById('fLeadType')||{}).value||'';
  const so=(document.getElementById('fSort')||{}).value||'created_at';
  filtered=prospects.filter(p=>{
    if(st&&p.status!==st)return false;
    if(pl&&p.platform!==pl)return false;
    if(pr&&String(p.priority)!==pr)return false;
    if(lt&&(p.lead_type||'')!==lt)return false;
    if(q){if(![p.name,p.email,p.phone,p.notes,p.source,p.lead_type,p.profile_url].join(' ').toLowerCase().includes(q))return false;}
    return true;
  });
  filtered.sort((a,b)=>{
    if(so==='name')return a.name.localeCompare(b.name);
    if(so==='score')return(b.total_score||0)-(a.total_score||0);
    if(so==='audience')return(b.audience_size||0)-(a.audience_size||0);
    if(so==='deal_value')return(b.deal_value||0)-(a.deal_value||0);
    return new Date(b.created_at)-new Date(a.created_at);
  });
  const ctag=document.getElementById('ctag');if(ctag)ctag.textContent=filtered.length+' contact'+(filtered.length!==1?'s':'');
}

function go(pg){
  page=pg;editId=null;closeDP();
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(b=>{if(b.getAttribute('onclick')?.includes(`'${pg}'`))b.classList.add('on');});
  const titles={dashboard:'Dashboard',analytics:'Analytics',pipeline:'Pipeline',inbox:'Inbox',reid:'Ask Reid',globaldata:'Global Data',playbook:'Playbook',admin:'Admin'};
  document.getElementById('pgtitle').textContent=titles[pg]||pg;
  const showTbar=['pipeline','globaldata'].includes(pg);
  document.getElementById('tbar').style.display=showTbar?'flex':'none';
  document.getElementById('addBtn').style.display=pg==='pipeline'?'flex':'none';
  document.getElementById('vtoggle').style.display=pg==='pipeline'?'flex':'none';
  if(pg==='pipeline'){if(sub!=='kanban'&&sub!=='table')sub='table';updateVbtns();}
  applyFilters();render();
}

function setSub(v){sub=v;updateVbtns();render();}
function updateVbtns(){['kanban','table'].forEach(v=>{const b=document.getElementById(v==='kanban'?'vkb':'vtbl');if(b)b.classList.toggle('on',v===sub);});}

function render(){
  if(page==='dashboard')renderDash();
  else if(page==='analytics')renderAnalytics();
  else if(page==='pipeline'){if(sub==='kanban')renderKanban();else renderTable();}
  else if(page==='inbox')renderInbox();
  else if(page==='reid')renderReid();
  else if(page==='globaldata')renderGlobalData();
  else if(page==='playbook')renderPlaybook();
  else if(page==='admin')renderAdmin();
}

// ─── DASHBOARD ──────────────────────────────────────────────
function renderDash(){
  const total=prospects.length;
  const activeAffiliates=prospects.filter(p=>p.lead_type==='Active Affiliate Partner').length;
  const potentialAffiliates=prospects.filter(p=>p.lead_type==='Potential Affiliate Partner').length;
  const totalDealVal=prospects.reduce((s,p)=>s+(p.deal_value||0),0);
  const totalCom=prospects.reduce((s,p)=>s+(p.deal_value||0)*(p.commission_pct||10)/100,0);
  const won=prospects.filter(p=>p.status==='closed_won').length;
  const outreachSent=prospects.filter(p=>['outreach_sent','lead','qualified','call_booked','follow_up','closed_won'].includes(p.status)).length;
  const inPipeline=prospects.filter(p=>['lead','qualified','call_booked','follow_up'].includes(p.status)).length;

function renderKanban(){
  const cols=Object.entries(STAGES).map(([key,info])=>{
    const cards=filtered.filter(p=>p.status===key);
    return`<div class="kc" data-status="${key}" ondragover="dov(event)" ondragleave="dlv(event)" ondrop="drp(event,'${key}')">
      <div class="kh"><div class="kd" style="background:${info.c}"></div><div class="kt">${info.l}</div><div class="kn">${cards.length}</div></div>
      <div class="kcards">${cards.map(p=>`
        <div class="kcard" draggable="true" data-id="${p.id}" ondragstart="ds(event)" onclick="openDetail('${p.id}')">
          <div class="kcard-n">${p.name}${p.profile_url?` <a href="${p.profile_url}" target="_blank" onclick="event.stopPropagation()" style="color:var(--ac);text-decoration:none;font-size:11px">🔗</a>`:''}</div>
          <div class="kcard-tags">${pb(p.platform)} ${prib(p.priority)}</div>
          ${p.deal_value?`<div class="kcard-val">💰 ${fmtC(p.deal_value)}</div>`:''}
          ${p.lead_type?`<div style="font-size:10px;color:var(--t3);margin-top:3px">${p.lead_type}</div>`:''}
        </div>`).join('')||`<div style="text-align:center;color:var(--t3);font-size:11px;padding:8px">Empty</div>`}
      </div>
      <button class="kadd" onclick="openAdd('${key}')">+ Add</button>
    </div>`;
  }).join('');
  document.getElementById('main').innerHTML=`<div class="kb">${cols}</div>`;
}
function ds(e){dragId=e.currentTarget.dataset.id;setTimeout(()=>{if(e.currentTarget)e.currentTarget.style.opacity='.35';},0);}
function dov(e){e.preventDefault();e.currentTarget.closest('.kc')?.classList.add('drag-over');}
function dlv(e){e.currentTarget.closest('.kc')?.classList.remove('drag-over');}
async function drp(e,ns){
  e.preventDefault();e.currentTarget.closest('.kc')?.classList.remove('drag-over');
  if(!dragId)return;
  const p=prospects.find(x=>x.id===dragId);if(!p||p.status===ns){dragId=null;return;}
  try{await req('PATCH','/prospects/'+dragId,{status:ns});p.status=ns;toast('→ '+STAGES[ns]?.l,'ok');applyFilters();if(document.getElementById('dp').classList.contains('on'))openDetail(dragId);}
  catch{toast('Move failed','err');}
  dragId=null;
}

let inboxFilter = 'all'; // all, unread, drafts, high, sent, follow_ups

  const unread = inboxEmails.filter(e => e.unread).length;
  const badge = document.getElementById('inboxBadge');

    badge.style.display = unread > 0 ? 'inline-block' : 'none';
    badge.textContent = unread;
  }
}

  updateInboxBadge();
  const unreadCount = inboxEmails.filter(e => e.unread).length;
  const draftCount = emailDrafts.filter(d => d.status === 'draft').length;
  const highCount = inboxEmails.filter(e => e.reid_priority === 'high').length;
  const sentCount = emailDrafts.filter(d => d.status === 'sent').length;
  const followUpCount = inboxEmails.filter(e => e.needs_follow_up && !e.follow_up_done).length;
  const unprocessedCount = inboxEmails.filter(e => !e.reid_processed).length;

  let emails = [...inboxEmails].sort((a,b) => new Date(b.date||b.created_at) - new Date(a.date||a.created_at));

  if (inboxFilter === 'unread') emails = emails.filter(e => e.unread);

  else if (inboxFilter === 'high') emails = emails.filter(e => e.reid_priority === 'high');

function escHtml(str) { return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setInboxFilter(f) { inboxFilter = f; renderInbox(); }

async function syncAndProcess() {
  const btn = document.getElementById('syncProcessBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Syncing…'; }
  try {
    await req('POST', '/inbox/sync', {});
    inboxEmails = await req('GET', '/inbox/emails');
    toast(`Synced ${inboxEmails.length} emails`, 'ok');
    renderInbox();
  } catch(e) { toast('Sync failed: ' + e.message, 'err'); }
  if (btn) { btn.disabled = false; btn.textContent = '🔄 Sync Gmail'; }

async function reidProcessInbox() {
  const unprocessed = inboxEmails.filter(e => !e.reid_processed).length;
  if (!unprocessed) { toast('All emails already processed'); return; }

  // Show processing overlay
  const ov = document.createElement('div');
  ov.className = 'processing-overlay';
  ov.id = 'processingOv';
  ov.innerHTML = `<div class="processing-card"><div class="spin" style="border-width:3px"></div><div style="font-size:15px;font-weight:600;margin-bottom:4px">Reid is processing…</div><div style="font-size:12px;color:var(--t3)" id="processStatus">Analyzing ${unprocessed} emails, drafting replies…</div></div>`;
  document.body.appendChild(ov);

  try {
    const r = await req('POST', '/inbox/auto-process', {});
    document.getElementById('processStatus').textContent = `Done! Processed ${r.processed} emails.`;
    // Reload data
    [inboxEmails, emailDrafts] = await Promise.all([req('GET', '/inbox/emails'), req('GET', '/inbox/drafts')]);
    setTimeout(() => { ov.remove(); renderInbox(); toast(`Reid processed ${r.processed} emails`, 'ok'); }, 1200);
  } catch(e) {
    ov.remove();
    toast('Processing failed: ' + e.message, 'err');
  }
}

async function approveDraft(draftId) {
  if (!confirm('Send this email?')) return;
  try {
    await req('POST', '/inbox/send/' + draftId, {});
    const d = emailDrafts.find(x => x.id === draftId);
    if (d) d.status = 'sent';
    toast('Email sent!', 'ok');
    renderInbox();
  } catch(e) { toast('Send failed: ' + e.message, 'err'); }
}

function editDraft(draftId) {
  const draft = emailDrafts.find(d => d.id === draftId);
  if (!draft) return;
  const dp = document.getElementById('dp');
  dp.classList.add('on');
  dp.innerHTML = `

async function saveDraftEdit(draftId, andSend = false) {
  const subject = document.getElementById('editDraftSubj')?.value || '';
  const body = document.getElementById('editDraftBody')?.value || '';
  try {
    await req('PATCH', '/inbox/drafts/' + draftId, { subject, body });
    const d = emailDrafts.find(x => x.id === draftId);
    if (d) { d.subject = subject; d.body = body; }
    toast('Draft saved', 'ok');
    if (andSend) {
      await req('POST', '/inbox/send/' + draftId, {});
      if (d) d.status = 'sent';
      toast('Email sent!', 'ok');
    }
    closeDP();
    renderInbox();
  } catch(e) { toast('Failed: ' + e.message, 'err'); }
}

async function deleteDraft(draftId) {
  if (!confirm('Discard this draft?')) return;
  try {
    await req('DELETE', '/inbox/drafts/' + draftId);
    emailDrafts = emailDrafts.filter(d => d.id !== draftId);
    const email = inboxEmails.find(e => e.reid_draft_id === draftId);
    if (email) email.reid_draft_id = null;
    renderInbox();
    toast('Draft discarded');
  } catch(e) { toast('Failed', 'err'); }
}

async function reidDraftSingle(emailId) {

        <button class="btn bg xsm" onclick="quickChat('Write a follow-up for someone who hasn\'t responded in 5 days')">🔄 Follow-up</button>
      </div>

  const msgs=document.getElementById('chatMsgs');if(msgs)msgs.scrollTop=msgs.scrollHeight;
  const inp=document.getElementById('chatIn');

function renderChatMsg(m){
  return`<div class="chat-msg ${m.role}">
    <div class="chat-avatar ${m.role}">${m.role==='reid'?'R':'A'}</div>
    <div>
      <div class="chat-bubble">${m.text}</div>
      <div class="chat-meta">${m.time||nowStr()}</div>
    </div>
  </div>`;
}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}
async function sendChat(){
  const inp=document.getElementById('chatIn');
  if(!inp)return;
  const msg=inp.value.trim();if(!msg)return;
  inp.value='';inp.style.height='auto';
  const time=nowStr();
  chatHistory.push({role:'user',text:msg,time});
  const msgs=document.getElementById('chatMsgs');
  if(msgs){msgs.innerHTML+=renderChatMsg({role:'user',text:msg,time});msgs.scrollTop=msgs.scrollHeight;}
  const btn=document.getElementById('chatSend');if(btn)btn.disabled=true;
  // Show typing indicator
  const typingId='typing-'+Date.now();
  if(msgs){msgs.innerHTML+=`<div class="chat-msg reid" id="${typingId}"><div class="chat-avatar reid">R</div><div><div class="chat-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div></div>`;msgs.scrollTop=msgs.scrollHeight;}
  const stats={total:prospects.length,active:prospects.filter(p=>p.lead_type==='Active Affiliate Partner').length,stages:Object.entries(STAGES).map(([k])=>({stage:k,count:prospects.filter(p=>p.status===k).length})),totalDealValue:prospects.reduce((s,p)=>s+(p.deal_value||0),0)};
  const fullPrompt=`[CRM Context: ${prospects.length} total prospects, ${stats.active} active affiliates, $${stats.totalDealValue} total deal value]\n\n${chatHistory.slice(-6).map(m=>(m.role==='user'?'Aubtin':'Reid')+': '+m.text).join('\n')}\n\nAubtin: ${msg}`;
  try{
    const r=await req('POST','/analyze',{
      prompt:fullPrompt
    });
    let replyText=r.analysis||'something went wrong on my end, try again';
    replyText=await executeReidActions(replyText);
    const replyTime=nowStr();
    chatHistory.push({role:'reid',text:replyText,time:replyTime});
    const typingEl=document.getElementById(typingId);if(typingEl)typingEl.remove();
    if(msgs){msgs.innerHTML+=renderChatMsg({role:'reid',text:replyText,time:replyTime});msgs.scrollTop=msgs.scrollHeight;}
  }catch(e){
    const typingEl=document.getElementById(typingId);if(typingEl)typingEl.remove();
    const errText='error: '+e.message;
    chatHistory.push({role:'reid',text:errText,time:nowStr()});
    if(msgs){msgs.innerHTML+=renderChatMsg({role:'reid',text:errText,time:nowStr()});msgs.scrollTop=msgs.scrollHeight;}
  }
  if(btn)btn.disabled=false;
}

// ─── CSV ─────────────────────────────────────────────────────
function importCSV(){const i=document.createElement('input');i.type='file';i.accept='.csv';i.onchange=e=>handleCSV(e.target.files[0]);i.click();}
function parseCSV(txt){
  const lines=txt.trim().split('\n');
  const hdrs=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/[\s"']+/g,'_').replace(/[^a-z0-9_]/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(let c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=c;}
    vals.push(cur.trim());
    const o={};hdrs.forEach((h,i)=>{o[h]=(vals[i]||'').replace(/^"|"$/g,'').trim();});return o;
  });
}
async function handleCSV(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const rows=parseCSV(e.target.result);
    const records=rows.map(r=>({name:r.name||r.handle||r.creator||r.brand||'',handle:r.handle||r.username||'',platform:r.platform||'',email:r.email||'',phone:r.phone||'',audience_size:parseInt(r.audience_size||r.followers||0)||0,fit_score:parseInt(r.fit_score||r.score||0)||0,profile_url:r.profile_url||r.url||'',status:r.status||'prospect',priority:parseInt(r.priority)||3,notes:r.notes||'',content_focus:r.content_focus||r.niche||'',source:r.source||'csv-import',lead_type:r.lead_type||'Potential Affiliate Partner',deal_value:parseFloat(r.deal_value)||0,commission_pct:parseFloat(r.commission_pct)||10})).filter(r=>r.name||r.handle);
    if(!records.length){toast('No valid rows','err');return;}
    if(!confirm(`Import ${records.length} contacts?`))return;
    try{const res=await req('POST','/prospects/bulk',{records});prospects=await req('GET','/prospects');toast(`Imported ${res.added} contacts`,'ok');applyFilters();render();}
    catch(e){toast('Import failed: '+e.message,'err');}
  };
  reader.readAsText(file);
}
function exportCSV(){
  const cols=['name','handle','platform','lead_type','status','priority','deal_value','commission_pct','audience_size','total_score','email','phone','content_focus','source','notes','profile_url','created_at'];
  const data=filtered.length?filtered:prospects;
  const rows=data.map(p=>cols.map(c=>{const v=String(p[c]??'').replace(/"/g,'""');return v.includes(',')||v.includes('"')||v.includes('\n')?`"${v}"`:v;}).join(','));
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent([cols.join(','),...rows].join('\n'));
  a.download='apex-affiliates-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  toast(`Exported ${rows.length} records`);
}

// ─── EMAIL TAGS ──────────────────────────────────────────────
const TAG_OPTIONS = ['Lead','Qualified','Call Booked','Follow Up','Closed Won','Closed Lost'];
const TAG_CLASSES = {'Lead':'etag-lead','Qualified':'etag-qualified','Call Booked':'etag-call_booked','Follow Up':'etag-follow_up','Closed Won':'etag-closed_won','Closed Lost':'etag-closed_lost'};

function renderEmailTags(emailId, tags) {
  const tagHtml = (tags||[]).map(t => `<span class="etag ${TAG_CLASSES[t]||''}" onclick="removeEmailTag('${emailId}','${t}')" title="Click to remove">${t} ×</span>`).join('');
  const addBtn = `<span class="etag etag-add" onclick="showTagPicker('${emailId}')">+ Tag</span>`;
  return `<div class="email-tags" id="etags-${emailId}" style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">${tagHtml}${addBtn}</div>`;
}

function showTagPicker(emailId) {
  const email = inboxEmails.find(e => e.id === emailId);
  const existing = email?.tags || [];
  const available = TAG_OPTIONS.filter(t => !existing.includes(t));
  if (!available.length) { toast('All tags applied'); return; }
  const menu = document.createElement('div');
  menu.style.cssText = 'position:fixed;z-index:200;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--shd);min-width:140px;padding:4px 0';
  available.forEach(tag => {
    const item = document.createElement('div');
    item.style.cssText = 'padding:7px 12px;font-size:12px;cursor:pointer;color:var(--t2)';
    item.textContent = tag;
    item.onmouseover = () => item.style.background = 'var(--bg4)';
    item.onmouseout = () => item.style.background = '';
    item.onclick = () => { addEmailTag(emailId, tag); document.body.removeChild(menu); };
    menu.appendChild(item);
  });
  const btn = document.querySelector(`#etags-${emailId} .etag-add`);
  if (btn) { const r = btn.getBoundingClientRect(); menu.style.top = (r.bottom + 4) + 'px'; menu.style.left = r.left + 'px'; }
  else { menu.style.top = '50%'; menu.style.left = '50%'; }
  document.body.appendChild(menu);
  setTimeout(() => document.addEventListener('click', () => { if(document.body.contains(menu)) document.body.removeChild(menu); }, { once: true }), 10);
}

async function addEmailTag(emailId, tag) {
  const email = inboxEmails.find(e => e.id === emailId);
  if (!email) return;
  const tags = [...new Set([...(email.tags||[]), tag])];
  try {
    await req('PATCH', '/inbox/emails/' + emailId + '/tags', { tags });
    email.tags = tags;
    const container = document.getElementById('etags-' + emailId);
    if (container) container.outerHTML = renderEmailTags(emailId, tags);
    toast(tag + ' tag added', 'ok');
  } catch(e) { toast('Failed', 'err'); }
}

async function removeEmailTag(emailId, tag) {
  const email = inboxEmails.find(e => e.id === emailId);
  if (!email) return;
  const tags = (email.tags||[]).filter(t => t !== tag);
  try {
    await req('PATCH', '/inbox/emails/' + emailId + '/tags', { tags });
    email.tags = tags;
    const container = document.getElementById('etags-' + emailId);
    if (container) container.outerHTML = renderEmailTags(emailId, tags);
  } catch(e) { toast('Failed', 'err'); }
}

async function executeReidActions(responseText) {
  const actionRegex = /<<ACTION:(\w+)>>([\s\S]*?)<<END_ACTION>>/g;
  let match;
  let cleanText = responseText;
  const actions = [];
  while ((match = actionRegex.exec(responseText)) !== null) {
    actions.push({ type: match[1], data: match[2].trim() });
    cleanText = cleanText.replace(match[0], '').trim();
  }
  for (const action of actions) {
    try {
      const data = JSON.parse(action.data);
      if (action.type === 'create_contact') {
        const r = await req('POST', '/prospects', {
          name: data.name || 'Unknown',
          email: data.email || '',
          phone: data.phone || '',
          platform: data.platform || '',
          lead_type: data.lead_type || 'Potential Affiliate Partner',
          profile_url: data.profile_url || '',
          audience_size: data.audience_size || 0,
          deal_value: data.deal_value || 0,
          status: data.status || 'prospect',
          priority: data.priority || 3,
          notes: data.notes || '',
          iap_score: 0
        });
        prospects.unshift({ ...data, id: r.id, total_score: 0, created_at: new Date().toISOString() });
        applyFilters();
        toast('✅ ' + (data.name || 'Contact') + ' added to pipeline', 'ok');
      }
      if (action.type === 'update_contact') {
        const p = prospects.find(x => x.name?.toLowerCase().includes(data.name?.toLowerCase()));
        if (p) {
          await req('PATCH', '/prospects/' + p.id, data);
          Object.assign(p, data);
          applyFilters();
          toast('Updated ' + p.name, 'ok');
        }
      }
    } catch(e) {
      console.error('Reid action failed:', action.type, e.message);
    }
  }
  return cleanText;
}
